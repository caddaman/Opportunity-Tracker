:root{--bg:#09090f;--surface:#0f1018;--card:#141620;--card2:#191c27;--card3:#1e2133;--border:#1d202e;--border2:#252840;--text:#e2ddd6;--dim:#6b6760;--muted:#38363b;--accent:#f0b429;--a2:#ffd166;--green:#26c486;--red:#e84545;--blue:#4a94e8;--purple:#9d71e8;--orange:#f08c28;--teal:#20c0a0;--miss:#b97cfc;--r:8px;--rsm:5px;--rlg:12px;--shadow:0 4px 24px rgba(0,0,0,.6);--tl-label-w:160px}
@media(max-width:720px){:root{--tl-label-w:108px}}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{color-scheme:dark}
body{background:var(--bg);color:var(--text);font-family:var(--ui-font,'DM Sans',system-ui,sans-serif);font-size:13.5px;line-height:1.6;min-height:100vh;overflow-x:hidden}
html{scrollbar-color:var(--border2) transparent}::-webkit-scrollbar{width:var(--sb-w,11px);height:var(--sb-w,11px)}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:8px;border:2px solid transparent;background-clip:padding-box}::-webkit-scrollbar-thumb:hover{background:var(--dim);border:2px solid transparent;background-clip:padding-box}
.topbar{min-height:50px;display:flex;align-items:center;padding:6px 16px;gap:8px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.brand{display:flex;align-items:center;gap:8px;flex-shrink:0}
.mark{width:26px;height:26px;background:var(--accent);border-radius:5px;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;color:#09090f}
.brand-name{font-size:14px;font-weight:600;letter-spacing:-.3px}
.sep{width:1px;height:18px;background:var(--border2);flex-shrink:0}
.nav{display:flex;flex-wrap:wrap;gap:1px 2px;flex:1;align-content:center}
.nb{padding:5px 10px;border-radius:var(--rsm);cursor:pointer;font-size:12px;font-weight:500;color:var(--dim);white-space:nowrap;transition:all .15s;border:none;background:none;font-family:'DM Sans',sans-serif}
.nb:hover{color:var(--text);background:var(--card2)}.nb.on{color:var(--accent);background:var(--card2);box-shadow:inset 0 -2px 0 var(--accent)}
.segbar{display:inline-flex;gap:3px;padding:3px;margin-bottom:14px;background:var(--card2);border:1px solid var(--border);border-radius:var(--r)}
.segbtn{padding:6px 14px;border-radius:var(--rsm);cursor:pointer;font-size:12.5px;font-weight:500;color:var(--dim);white-space:nowrap;border:none;background:none;transition:all .15s;font-family:'DM Sans',sans-serif}
.segbtn:hover{color:var(--text)}.segbtn.on{color:#fff;background:var(--accent)}
.tb-right{display:flex;gap:6px;flex-shrink:0}
.layout{display:flex;height:calc(100vh - 50px)}
.sidebar{width:182px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);padding:10px 7px;overflow-y:auto}
.slbl{font-size:9px;font-weight:600;color:var(--muted);letter-spacing:1.8px;text-transform:uppercase;padding:10px 9px 3px;font-family:'JetBrains Mono',monospace}
.sitem{display:flex;align-items:center;gap:7px;padding:7px 9px;border-radius:var(--rsm);cursor:pointer;color:var(--dim);font-size:12px;font-weight:500;transition:all .15s;user-select:none;border:1px solid transparent}
.sitem:hover{background:var(--card2);color:var(--text)}.sitem.on{background:var(--card2);color:var(--accent);border-color:var(--border2)}
.sitem.miss.on{color:var(--miss);border-color:rgba(185,124,252,.25)}
.sc{margin-left:auto;font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--muted);background:var(--bg);padding:1px 5px;border-radius:10px}
.sitem.on .sc{color:inherit;opacity:.7}.sitem.miss.on .sc{color:var(--miss);opacity:.9}
.main{flex:1;overflow-y:auto;padding:22px 26px;min-width:0}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:var(--rsm);border:none;cursor:pointer;font-size:12.5px;font-weight:500;font-family:'DM Sans',sans-serif;transition:all .15s;white-space:nowrap;text-decoration:none}
.btn-primary{background:var(--accent);color:#09090f}.btn-primary:hover{background:var(--a2)}
.btn-ghost{background:transparent;color:var(--dim);border:1px solid var(--border2)}.btn-ghost:hover{background:var(--card2);color:var(--text)}
.btn-danger{background:rgba(232,69,69,.1);color:var(--red);border:1px solid rgba(232,69,69,.3)}.btn-danger:hover{background:rgba(232,69,69,.18)}
.btn-green{background:var(--green);color:#09090f}.btn-green:hover{filter:brightness(1.1)}
.btn-purple{background:var(--purple);color:#fff}.btn-purple:hover{filter:brightness(1.1)}
.btn-miss{background:var(--miss);color:#09090f}.btn-miss:hover{filter:brightness(1.1)}
.btn-discover{background:linear-gradient(135deg,#4a94e8,#9d71e8);color:#fff;font-weight:600}.btn-discover:hover{filter:brightness(1.08)}
.btn-sm{padding:4px 10px;font-size:12px}.btn-xs{padding:2px 7px;font-size:11px}
.btn:disabled{opacity:.4;cursor:not-allowed;pointer-events:none}
/* Stats */
.sbar{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:18px}
.sc2{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px}
.sv{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:600;line-height:1;letter-spacing:-1px}
.sl{font-size:9.5px;color:var(--dim);margin-top:4px;text-transform:uppercase;letter-spacing:.8px}
.sv-a{color:var(--accent)}.sv-r{color:var(--red)}.sv-g{color:var(--green)}.sv-m{color:var(--miss)}.sv-b{color:var(--blue)}
/* Page header */
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;gap:10px;flex-wrap:wrap}
.pt{font-size:19px;font-weight:700;letter-spacing:-.5px}.ps{font-size:12px;color:var(--dim);margin-top:3px}
.pa{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
/* Filters */
.frow{display:flex;gap:7px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.sw{position:relative}.sico{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--dim);pointer-events:none}
.ib{background:var(--card);border:1px solid var(--border2);border-radius:var(--rsm);color:var(--text);font-family:'DM Sans',sans-serif;font-size:12.5px;outline:none;transition:border-color .15s}
.ib:focus{border-color:var(--accent)}.ib::placeholder{color:var(--muted)}
.si2{padding:6px 10px 6px 28px;width:210px}.ssel{padding:6px 10px;cursor:pointer}
/* Opp cards */
.olist{display:flex;flex-direction:column;gap:6px}
.ocard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;display:grid;grid-template-columns:1fr auto;gap:10px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.ocard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;transition:background .15s}
.ocard:hover{background:var(--card2);border-color:var(--border2);transform:translateY(-2px);box-shadow:0 7px 20px rgba(0,0,0,.28)}.ocard:hover::before{background:var(--accent)}
.ocard.s0::before{background:var(--accent)}.ocard.s1::before{background:var(--red)}.ocard.s2::before{background:var(--orange)}.ocard.s3::before{background:var(--green)}.ocard.s4::before{background:var(--muted)}.ocard.s5::before{background:var(--miss)}
/* Ranked card with tier badge */
.tier-badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:600;font-family:'JetBrains Mono',monospace;padding:2px 8px;border-radius:3px;white-space:nowrap}
.tb-gov{background:rgba(74,148,232,.12);color:var(--blue)}.tb-found{background:rgba(38,196,134,.12);color:var(--green)}.tb-ngo{background:rgba(157,113,232,.12);color:var(--purple)}.tb-uni{background:rgba(240,180,41,.1);color:var(--accent)}.tb-other{background:rgba(107,103,96,.1);color:var(--dim)}
/* Score bar */
.sbar2{display:flex;gap:2px;height:4px;border-radius:2px;overflow:hidden;margin-top:5px;width:100%}
.sb-prestige{background:var(--blue)}.sb-urgency{background:var(--accent)}.sb-remote{background:var(--green)}.sb-stack{background:var(--teal)}
/* Opp card inner */
.on2{font-size:13.5px;font-weight:600;letter-spacing:-.2px;margin-bottom:3px;line-height:1.3}
.od{font-size:11.5px;color:var(--dim);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.om{display:flex;flex-wrap:wrap;gap:5px;align-items:center;margin-top:7px}
.ourl{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px}
.or{display:flex;flex-direction:column;align-items:flex-end;gap:4px;min-width:88px}
.dlbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;font-family:'JetBrains Mono',monospace}
.dval{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;color:var(--accent);text-align:right;white-space:nowrap}
.dval.miss-c{color:var(--miss)}
.dchip{font-family:'JetBrains Mono',monospace;font-size:10px;padding:2px 6px;border-radius:3px;background:rgba(240,180,41,.1);color:var(--accent)}
.dchip.urg{background:rgba(240,140,40,.1);color:var(--orange)}.dchip.ov{background:rgba(232,69,69,.1);color:var(--red)}.dchip.miss-d{background:rgba(185,124,252,.1);color:var(--miss)}
/* Badges/tags */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:3px;font-size:10px;font-weight:600;font-family:'JetBrains Mono',monospace;letter-spacing:.3px;white-space:nowrap}
.bd{width:4px;height:4px;border-radius:50%;flex-shrink:0}
.b0{background:rgba(107,103,96,.12);color:var(--dim)}.b0 .bd{background:var(--dim)}
.b1{background:rgba(74,148,232,.12);color:var(--blue)}.b1 .bd{background:var(--blue)}
.b2{background:rgba(157,113,232,.12);color:var(--purple)}.b2 .bd{background:var(--purple)}
.b3{background:rgba(38,196,134,.12);color:var(--green)}.b3 .bd{background:var(--green)}
.b4{background:rgba(232,69,69,.12);color:var(--red)}.b4 .bd{background:var(--red)}
.b5{background:rgba(240,140,40,.12);color:var(--orange)}.b5 .bd{background:var(--orange)}
.b6{background:rgba(185,124,252,.1);color:var(--miss)}.b6 .bd{background:var(--miss)}
.tag{display:inline-block;padding:2px 7px;border-radius:3px;font-size:10.5px;font-family:'JetBrains Mono',monospace;background:rgba(74,148,232,.1);color:var(--blue)}
.tag-r{background:rgba(38,196,134,.1);color:var(--green)}.tag-m{background:rgba(185,124,252,.1);color:var(--miss)}.tag-remote{background:rgba(32,192,160,.1);color:var(--teal)}
/* Callouts */
.call{padding:10px 13px;border-radius:var(--rsm);font-size:12px;line-height:1.55;margin-bottom:14px}
.call-i{background:rgba(74,148,232,.07);border:1px solid rgba(74,148,232,.2);color:var(--blue)}
.call-g{background:rgba(38,196,134,.07);border:1px solid rgba(38,196,134,.2);color:var(--green)}
.call-w{background:rgba(240,140,40,.07);border:1px solid rgba(240,140,40,.2);color:var(--orange)}
.call-m{background:rgba(185,124,252,.08);border:1px solid rgba(185,124,252,.2);color:var(--miss)}
/* Kanban */
.kboard{display:grid;grid-template-columns:repeat(6,minmax(148px,1fr));gap:8px;overflow-x:auto;padding-bottom:6px}
.kcol{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:9px;min-height:300px;transition:background .15s}
.kcol.drag-over{background:rgba(240,180,41,.04);border-color:rgba(240,180,41,.3)}
.khdr{font-size:9.5px;font-weight:600;text-transform:uppercase;letter-spacing:.9px;margin-bottom:9px;padding-bottom:7px;border-bottom:1px solid var(--border2);display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace}
.kcard{background:var(--surface);border:1px solid var(--border2);border-radius:var(--rsm);padding:8px 9px;margin-bottom:5px;cursor:grab;transition:all .15s;font-size:12px}
.kcard:hover{background:var(--card3);border-color:var(--accent)}.kcard.dragging{opacity:.5}
.kcard-name{font-weight:600;line-height:1.3;margin-bottom:3px}
.kcard-dl{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--accent)}.kcard-dl.ov{color:var(--red)}
/* Timeline */
.tl-legend{display:flex;flex-wrap:wrap;gap:10px 14px;margin-bottom:12px;font-size:10.5px;color:var(--dim)}
.tl-leg{display:flex;align-items:center;gap:5px}
.tl-leg-dot{width:9px;height:9px;border-radius:3px;display:inline-block;flex-shrink:0}
.tl-wrap{overflow-x:auto;padding-bottom:10px}
.tl-c{position:relative;width:max-content;min-width:100%}
.tl-axis{display:flex;margin-bottom:6px;padding-bottom:6px;border-bottom:2px solid var(--border2)}
.tl-axis-sp{width:var(--tl-label-w);flex-shrink:0}
.tl-axis-track{display:flex;flex-shrink:0}
.tl-mo{flex-shrink:0;font-size:9.5px;color:var(--dim);text-align:left;padding-left:7px;font-family:'JetBrains Mono',monospace;border-left:1px solid var(--border);text-transform:uppercase;letter-spacing:.3px}
.tl-today{position:absolute;top:0;bottom:0;width:2px;background:var(--red);opacity:.7;pointer-events:none;z-index:3}
.tl-today-lbl{position:absolute;top:-1px;left:3px;font-size:8.5px;color:#fff;background:var(--red);padding:0 4px;border-radius:3px;white-space:nowrap;font-family:'JetBrains Mono',monospace;font-weight:600}
.tl-row{display:flex;align-items:center;height:32px}
.tl-row:nth-child(even of .tl-row){background:rgba(255,255,255,.012)}
.tl-name{width:var(--tl-label-w);flex-shrink:0;font-size:11.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:right;padding-right:11px;color:var(--text)}
.tl-track{position:relative;height:100%;flex-shrink:0;border-left:1px solid var(--border2)}
.tl-grid{position:absolute;top:0;bottom:0;width:1px;background:var(--border);opacity:.55;pointer-events:none}
.tl-bar{position:absolute;top:50%;transform:translateY(-50%);height:21px;min-width:56px;border-radius:var(--rsm);cursor:pointer;display:flex;align-items:center;gap:5px;padding:0 8px;font-size:10px;font-weight:600;white-space:nowrap;font-family:'JetBrains Mono',monospace;color:#09090f;box-shadow:0 1px 4px rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.16);transition:transform .12s,box-shadow .12s;z-index:1}
.tl-bar:hover{transform:translateY(-50%) scale(1.05);box-shadow:0 4px 12px rgba(0,0,0,.55);z-index:5}
.tl-bar-dot{width:6px;height:6px;border-radius:50%;background:rgba(9,9,15,.5);flex-shrink:0}
.tl-bar-od{border-style:dashed;border-color:rgba(255,255,255,.55);border-width:1.5px}
/* Money won — topbar chip + dashboard hero */
.won-chip{display:inline-flex;align-items:center;gap:6px;padding:4px 11px;border-radius:999px;border:1px solid color-mix(in srgb,var(--accent) 45%,transparent);background:color-mix(in srgb,var(--accent) 14%,transparent);color:var(--accent);font-weight:700;font-size:12.5px;cursor:pointer;white-space:nowrap;transition:all .15s;font-family:'DM Sans',sans-serif}
.won-chip:hover{background:color-mix(in srgb,var(--accent) 24%,transparent);transform:translateY(-1px)}
.won-chip-ic{font-size:13px}.won-chip-v{font-family:'JetBrains Mono',monospace;letter-spacing:-.3px}
.won-hero{position:relative;overflow:hidden;display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:14px;padding:18px 22px;border-radius:var(--rlg);border:1px solid color-mix(in srgb,var(--accent) 35%,var(--border2));background:linear-gradient(135deg,color-mix(in srgb,var(--accent) 22%,var(--card)),color-mix(in srgb,var(--purple) 16%,var(--card)) 130%);box-shadow:0 6px 22px rgba(0,0,0,.28)}
.won-hero-empty{background:var(--card);border-color:var(--border2)}
.won-hero-shine{position:absolute;top:0;left:-60%;width:45%;height:100%;background:linear-gradient(105deg,transparent,rgba(255,255,255,.13),transparent);transform:skewX(-18deg);animation:wshine 5.5s ease-in-out infinite;pointer-events:none}
@keyframes wshine{0%,72%{left:-60%}88%,100%{left:130%}}
.won-hero-main{position:relative;z-index:1;min-width:0}
.won-hero-lbl{font-size:12px;font-weight:600;color:var(--text);opacity:.82;letter-spacing:.2px;margin-bottom:3px}
.won-hero-amt{font-family:'JetBrains Mono',monospace;font-size:38px;font-weight:700;line-height:1.05;letter-spacing:-1px;color:var(--accent);text-shadow:0 1px 0 rgba(0,0,0,.25)}
.won-hero-side{position:relative;z-index:1;display:flex;flex-direction:column;align-items:flex-end;gap:4px;text-align:right;flex-shrink:0;max-width:230px}
.won-hero-stat{display:flex;flex-direction:column;align-items:center;padding:6px 14px;border-radius:var(--r);background:rgba(255,255,255,.07)}
.won-hero-sv{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:var(--text)}
.won-hero-sl{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--dim)}
.won-hero-note{font-size:10.5px;color:var(--dim);line-height:1.45}
@media(max-width:560px){.won-hero{flex-direction:column;align-items:flex-start}.won-hero-side{align-items:flex-start;text-align:left;max-width:none}.won-hero-amt{font-size:30px}}
/* Theme picker */
.tp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.tp-card{position:relative;border:1.5px solid var(--border2);border-radius:var(--r);padding:10px;cursor:pointer;background:var(--card);transition:transform .12s,border-color .12s}
.tp-card:hover{transform:translateY(-2px);border-color:var(--dim)}
.tp-card.on{border-color:var(--accent);box-shadow:0 0 0 2px color-mix(in srgb,var(--accent) 35%,transparent)}
.tp-prev{height:46px;border-radius:6px;display:flex;align-items:center;gap:5px;padding:7px;margin-bottom:8px;overflow:hidden}
.tp-sw{width:15px;height:15px;border-radius:5px;flex-shrink:0;box-shadow:0 0 0 1px rgba(0,0,0,.2)}
.tp-btn{margin-left:auto;font-size:9px;font-weight:700;padding:3px 8px;color:#09090f}
.tp-name{font-size:12.5px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:5px}
.tp-tag{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px}
.tp-check{position:absolute;top:7px;right:9px;color:var(--accent);font-size:13px;font-weight:700}
/* Customization controls */
.cz-sec{display:flex;align-items:baseline;gap:8px;margin:17px 0 9px;font-size:12px;font-weight:700;color:var(--text);padding-bottom:5px;border-bottom:1px solid var(--border)}
.cz-sec:first-child{margin-top:2px}
.cz-sub{font-size:10.5px;font-weight:400;color:var(--dim)}
.cz-row{display:flex;flex-wrap:wrap;gap:7px;align-items:center}
.cz-acc{width:26px;height:26px;border-radius:50%;border:2px solid var(--border2);cursor:pointer;padding:0;transition:transform .12s}
.cz-acc:hover{transform:scale(1.12)}
.cz-acc.on{border-color:var(--text);box-shadow:0 0 0 2px var(--bg),0 0 0 3px var(--text)}
.cz-cp{width:36px;height:30px;padding:2px;border:1px solid var(--border2);border-radius:var(--rsm);background:var(--card);cursor:pointer}
.cz-range{flex:1;min-width:170px;accent-color:var(--accent);cursor:pointer;height:22px}
.cz-spd{min-width:48px;text-align:right;font-family:'JetBrains Mono',monospace;font-size:12.5px;font-weight:600;color:var(--accent)}
.cz-adv{display:flex;align-items:center;justify-content:space-between;margin:18px 0 4px;padding:9px 12px;border:1px solid var(--border2);border-radius:var(--rsm);background:var(--card2);font-size:12px;font-weight:700;color:var(--text);cursor:pointer;user-select:none}
.cz-adv:hover{border-color:var(--dim)}
.cz-adv-caret{font-size:11px;color:var(--dim)}
.upd-banner{display:flex;align-items:center;gap:8px;padding:8px 16px;background:linear-gradient(90deg,color-mix(in srgb,var(--accent) 20%,var(--surface)),var(--surface));border-bottom:1px solid var(--border2);font-size:12.5px;color:var(--text)}
.upd-x{margin-left:auto;background:none;border:none;color:var(--dim);font-size:16px;cursor:pointer;line-height:1;padding:0 4px}
.upd-x:hover{color:var(--text)}
.tp-del{position:absolute;top:5px;left:6px;width:18px;height:18px;border-radius:50%;border:none;background:rgba(0,0,0,.35);color:#fff;font-size:13px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;opacity:.7}
.tp-del:hover{opacity:1;background:var(--red)}
.tp-edit{position:absolute;top:5px;left:28px;width:18px;height:18px;border-radius:50%;border:none;background:rgba(0,0,0,.35);color:#fff;font-size:11px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;opacity:.7}
.tp-edit:hover{opacity:1;background:var(--accent);color:#09090f}
.tb-prev{border-radius:var(--r);padding:14px;margin-bottom:14px}
.tb-prev-card{border-radius:var(--rsm);padding:12px 14px}
.tb-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 16px}
@media(max-width:560px){.tb-grid{grid-template-columns:1fr}}
.tb-row{display:flex;align-items:center;gap:8px}
.tb-lbl{font-size:11.5px;color:var(--dim);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tb-cp{width:30px;height:28px;padding:2px;border:1px solid var(--border2);border-radius:var(--rsm);background:var(--card);cursor:pointer;flex-shrink:0}
.tb-tx{width:98px;flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:11.5px;padding:5px 7px}
[data-density=compact] .ocard,[data-density=compact] .sc2,[data-density=compact] .doc-card,[data-density=compact] .rec-card{padding:7px 10px}
[data-density=compact] .olist{gap:3px}
[data-density=compact] .mbody{padding:12px 14px}
[data-density=comfortable] .ocard,[data-density=comfortable] .sc2,[data-density=comfortable] .doc-card,[data-density=comfortable] .rec-card{padding:17px 19px}
[data-density=comfortable] .olist{gap:10px}
[data-density=comfortable] .mbody{padding:24px 26px}
/* Achievements */
.ach-strip{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:11px 14px;margin-bottom:14px;cursor:pointer;transition:border-color .15s}
.ach-strip:hover{border-color:var(--border2)}
.ach-strip-h{display:flex;align-items:center;justify-content:space-between;font-size:12px;font-weight:700;color:var(--text);margin-bottom:8px}
.ach-count{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent);background:color-mix(in srgb,var(--accent) 14%,transparent);padding:1px 8px;border-radius:10px}
.ach-chips{display:flex;flex-wrap:wrap;gap:7px}
.ach-chip{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;background:var(--card2);border:1px solid var(--border2)}
.ach-chip.locked{filter:grayscale(1);opacity:.32}
.ach-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.ach-card{border:1px solid var(--border2);border-radius:var(--r);padding:13px 11px;text-align:center;background:var(--card);opacity:.6}
.ach-card.on{opacity:1;border-color:color-mix(in srgb,var(--accent) 45%,var(--border2));background:linear-gradient(160deg,color-mix(in srgb,var(--accent) 12%,var(--card)),var(--card))}
.ach-ic{font-size:28px;line-height:1;margin-bottom:6px}
.ach-card:not(.on) .ach-ic{filter:grayscale(1);opacity:.5}
.ach-t{font-size:12.5px;font-weight:700;color:var(--text)}
.ach-d{font-size:10.5px;color:var(--dim);margin:3px 0 7px;line-height:1.4}
.ach-bar{height:5px;border-radius:4px;background:var(--card3);overflow:hidden}
.ach-bar-f{height:100%;background:var(--accent);border-radius:4px}
.ach-pct{font-size:10px;color:var(--dim);margin-top:4px;font-family:'JetBrains Mono',monospace}
.ach-pct.done{color:var(--green);font-weight:600}
/* Winnings breakdown */
.wb{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:13px 15px;margin-bottom:14px}
.wb-h{font-size:12px;font-weight:700;color:var(--text);margin-bottom:9px}
.wb-row{display:flex;align-items:center;gap:10px;padding:4px 0;cursor:pointer}
.wb-row:hover .wb-name{color:var(--accent)}
.wb-name{width:34%;min-width:90px;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.wb-bar{flex:1;height:9px;border-radius:5px;background:var(--card3);overflow:hidden}
.wb-bar-f{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--accent),var(--a2));transition:width .5s ease}
.wb-amt{font-family:'JetBrains Mono',monospace;font-size:11.5px;font-weight:600;color:var(--accent);min-width:64px;text-align:right}
/* Submission heatmap */
.hm{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:13px 15px;margin-bottom:14px;overflow-x:auto}
.hm-h{display:flex;justify-content:space-between;align-items:baseline;font-size:12px;font-weight:700;color:var(--text);margin-bottom:10px}
.hm-grid{display:flex;gap:3px;min-width:max-content}
.hm-col{display:flex;flex-direction:column;gap:3px}
.hm-cell{width:11px;height:11px;border-radius:2px;background:var(--card3)}
.hm-cell.l1{background:color-mix(in srgb,var(--accent) 28%,var(--card3))}
.hm-cell.l2{background:color-mix(in srgb,var(--accent) 52%,var(--card3))}
.hm-cell.l3{background:color-mix(in srgb,var(--accent) 76%,var(--card3))}
.hm-cell.l4{background:var(--accent)}
.hm-leg{display:flex;align-items:center;gap:4px;margin-top:9px;font-size:10px;color:var(--dim)}
.hm-leg .hm-cell{width:10px;height:10px}
/* Share card */
.share-canvas{width:100%;max-width:340px;border-radius:var(--r);border:1px solid var(--border2);box-shadow:var(--shadow)}
/* Skeleton loaders */
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel{background:linear-gradient(90deg,var(--card2) 25%,var(--card3) 37%,var(--card2) 63%);background-size:200% 100%;animation:shimmer 1.3s linear infinite;border-radius:4px}
.skel-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;display:flex;flex-direction:column;gap:9px}
.skel-line{height:11px}.skel-line.w90{width:90%}.skel-line.w60{width:60%}.skel-line.w40{width:40%;height:9px}
/* Page transition */
@keyframes pageIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.page-enter{animation:pageIn .22s ease}
/* Deadline urgency emphasis */
.ocard.s1::before,.ocard.s2::before{width:4px}
.ocard.s1{box-shadow:inset 7px 0 20px -12px var(--red)}
.ocard.s2{box-shadow:inset 7px 0 20px -12px var(--orange)}
@keyframes dpulse{0%,100%{opacity:1}50%{opacity:.5}}
.dchip.urg,.dchip.ov{animation:dpulse 1.9s ease-in-out infinite}
/* Goal progress bar in hero */
.won-goal{margin-top:9px;max-width:340px}
.won-goal-track{height:7px;border-radius:5px;background:rgba(255,255,255,.14);overflow:hidden}
.won-goal-fill{height:100%;border-radius:5px;background:var(--accent);transition:width .5s ease}
.won-goal-lbl{font-size:10.5px;color:var(--text);opacity:.8;margin-top:4px}
/* Discover page */
.disc-hero{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:22px;margin-bottom:18px;text-align:center}
.disc-title{font-size:22px;font-weight:700;letter-spacing:-.5px;margin-bottom:6px}
.disc-sub{font-size:13px;color:var(--dim);margin-bottom:18px;line-height:1.5;max-width:580px;margin-left:auto;margin-right:auto}
.disc-btn-wrap{display:flex;justify-content:center;gap:10px;flex-wrap:wrap}
.disc-big-btn{padding:12px 32px;font-size:15px;font-weight:700;border-radius:var(--r);border:none;cursor:pointer;display:inline-flex;align-items:center;gap:8px;font-family:'DM Sans',sans-serif;transition:all .2s}
.disc-btn-primary{background:linear-gradient(135deg,#4a94e8,#9d71e8);color:#fff}.disc-btn-primary:hover{filter:brightness(1.1);transform:translateY(-1px)}
.disc-btn-secondary{background:var(--card2);color:var(--text);border:1px solid var(--border2)}.disc-btn-secondary:hover{background:var(--card3)}
.disc-btn-primary:disabled,.disc-btn-secondary:disabled{opacity:.5;cursor:not-allowed;transform:none}
.disc-progress{display:flex;flex-direction:column;align-items:center;padding:24px}
.disc-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.disc-stat{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px;text-align:center}
.disc-sv{font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:600}
.disc-sl{font-size:9.5px;color:var(--dim);text-transform:uppercase;letter-spacing:.6px;margin-top:4px}
/* Ranked bucket headers */
.bucket-hdr{display:flex;align-items:center;gap:8px;margin:16px 0 8px;padding-bottom:7px;border-bottom:1px solid var(--border)}
.bucket-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;font-family:'JetBrains Mono',monospace}
.bucket-count{font-size:10px;color:var(--muted);background:var(--card2);padding:2px 7px;border-radius:10px;font-family:'JetBrains Mono',monospace}
/* Docs */
.doc-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:6px;display:flex;gap:11px;align-items:flex-start;cursor:pointer;transition:all .15s}
.doc-card:hover{background:var(--card2);border-color:var(--border2)}
.doc-icon{font-size:22px;flex-shrink:0;line-height:1}
.doc-info{flex:1;min-width:0}
.doc-name{font-size:13px;font-weight:600;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

<script>
const STATUSES=['Not Started','In Progress','Submitted','Accepted','Rejected','Deferred','Missed'];
const BC=['b0','b1','b2','b3','b4','b5','b6'];
const STATUS_COLORS={'Not Started':'var(--dim)','In Progress':'var(--blue)','Submitted':'var(--purple)','Accepted':'var(--green)','Rejected':'var(--red)','Deferred':'var(--orange)','Missed':'var(--miss)'};
const DOC_ICONS={resume:'📄',cv:'📋',transcript:'🎓',writing_sample:'✍️',cover_letter:'📝',essay:'📓',portfolio:'🗂️',other:'📁'};
const PAGES=[['dashboard','📊 Dashboard'],['discover','🔍 Discover'],['risk','⚠ Triage'],['pipeline','🗂 Pipeline'],['library','📁 Library'],['recs','📬 Recs'],['alerts','🔔 Alerts'],['report','🌙 Report'],['email','📧 Email'],['profile','👤 Profile']];

let S={
  page:'dashboard',tab:'upcoming',
  opps:[],stats:null,ranked:[],labs:[],essays:[],docs:[],recommenders:[],recRequests:[],
  profile:{},personalInfo:{},reportContent:'',reportExists:false,reportModified:null,reportRunning:false,reportError:null,emailConfig:{},
  loading:true,

  activeOpp:null,activeEssay:null,activeDoc:null,activeLab:null,eligibility:null,

  recForm:{name:'',title:'',institution:'',email:'',relationship:'',notes:''},
  scraping:false,scrapeMsg:null,rawDates:[],saving:false,inputTab:'url',pasteText:'',
  scanning:false,scanMsg:null,siteFound:[],
  editorDocId:null,editorText:'',editorOppId:null,editorResult:null,editorRunning:false,
  discoveryRunning:false,discoveryResult:null,customQuery:'',exhaustive:false,rankedLoading:false,discoSchedule:null,prefs:null,personas:null,hideIneligible:false,
  // Cross-cutting filters (apply on both Dashboard and Discover; persist across page switches)
  fModality:'',fField:[],fTypes:[],fFunding:'',fElig:'',fLevels:[],eligMap:null,
  dupWarning:null,
  toasts:[],_tid:0,
  alertSubs:[],alertNotifs:[],alertUnread:0,alertSubForm:{url:'',label:'',check_frequency:'daily'},
  applications:[],appStats:null,appOutcomes:['Submitted','Interview','Accepted','Rejected','Waitlisted','Deferred','Withdrawn'],appForm:null,
  notifs:[],notifUnread:0,matches:null,discoNew:null,

};

function nof(){return{url:'',name:'',description:'',eligibility:'',deadline:'',opening_date:'',status:'Not Started',recurring:true,tags:'',notes:'',priority:0,missed:false,estimated_next_open:'',award_amount:''}}
function nmf(){return{url:'',name:'',description:'',deadline:'',tags:'',notes:'',estimated_next_open:''}}
function ss(p){S={...S,...p};render()}
function sf(k,v){ss({form:{...S.form,[k]:v}})}
function mf2(k,v){ss({mform:{...S.mform,[k]:v}})}

async function api(m,path,body){
  const o={method:m,headers:{'Content-Type':'application/json'}};
  if(body)o.body=JSON.stringify(body);
  const r=await fetch(path,o);
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.detail||r.statusText)}
  if(r.status===204)return null;
  return r.json();
}

async function load(){try{const[o,s]=await Promise.all([api('GET','/api/opportunities'),api('GET','/api/stats')]);ss({opps:o,stats:s,loading:false});checkAchievements()}catch(e){toast('err','Load failed: '+e.message);ss({loading:false})}}
async function loadLabs(){try{const l=await api('GET','/api/labs');ss({labs:l})}catch(e){toast('err',e.message)}}
async function loadEssays(){try{const e=await api('GET','/api/essays');ss({essays:e})}catch(e){toast('err',e.message)}}
async function loadDocs(){try{const d=await api('GET','/api/documents');ss({docs:d})}catch(e){toast('err',e.message)}}
async function loadRecs(){try{const[r,q]=await Promise.all([api('GET','/api/recommenders'),api('GET','/api/rec-requests')]);ss({recommenders:r,recRequests:q})}catch(e){toast('err',e.message)}}
async function loadProfile(){try{const p=await api('GET','/api/profile');ss({profile:p})}catch(e){}}
async function loadPersonalInfo(){try{const pi=await api('GET','/api/personal-info');ss({personalInfo:pi})}catch(e){}}
async function loadAlerts(){
  try{
    const[subs,notifs,uc]=await Promise.all([
      api('GET','/api/alerts/subscriptions'),
      api('GET','/api/alerts/notifications'),
      api('GET','/api/alerts/unread-count'),
    ]);
    ss({alertSubs:subs,alertNotifs:notifs,alertUnread:uc.count||0});
  }catch(e){toast('err','Could not load alerts: '+e.message)}
}
async function loadEmail(){try{const c=await api('GET','/api/email-config');ss({emailConfig:c})}catch(e){}}
async function loadReport(){try{const r=await api('GET','/api/reports/latest');ss({reportContent:r.content,reportExists:!!r.exists,reportModified:r.modified||null})}catch(e){ss({reportContent:'No report yet. Click “Run Now” to build one.',reportExists:false})}}
// Kick off the overnight pipeline in the background and poll until it finishes.
async function runReport(opts){
  if(S.reportRunning)return;
  ss({reportRunning:true,reportError:null});
  try{
    const r=await api('POST','/api/reports/run',opts||{});
    if(!r.started&&r.running){toast('inf','A report run is already in progress');}
    else{toast('inf','Building report… this can take several minutes');}
  }catch(e){toast('err',e.message);ss({reportRunning:false});return}
  pollReportStatus();
}
async function pollReportStatus(){
  try{
    const st=await api('GET','/api/reports/run-status');
    if(st.running){if(S.page==='report')setTimeout(pollReportStatus,4000);else ss({reportRunning:true});return}
    // Finished — refresh content and surface the outcome.
    ss({reportRunning:false,reportError:st.ok?null:(st.error||'Report run failed')});
    if(st.ok){toast('ok','Overnight report ready');load();}
    else if(st.ok===false){toast('err','Report run failed — see details on the Report page');}
    loadReport();
  }catch(e){ss({reportRunning:false})}
}
async function loadChecklist(id){try{const c=await api('GET','/api/checklists/'+id);ss({checklist:c})}catch(e){ss({checklist:null})}}
async function loadWorkspace(id){try{const w=await api('GET','/api/workspace/'+id);ss({workspace:w})}catch(e){ss({workspace:null})}}

async function loadEligibilityScreen(){try{const m=await api('GET','/api/eligibility/screen');ss({eligMap:m})}catch(e){}}

function toast(type,msg){const id=++S._tid;ss({toasts:[...S.toasts,{id,type,msg}]});setTimeout(()=>ss({toasts:S.toasts.filter(t=>t.id!==id)}),3200)}

// Helpers
function bc(s){return BC[STATUSES.indexOf(s)]||'b0'}
function fd(iso){if(!iso||iso==='rolling')return iso||'—';try{return new Date(iso+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}catch{return iso}}
// Money helpers. fmtMoney renders a clean USD figure; wonStats sums award_amount over Accepted opps (the "won scholarships").
function fmtMoney(n){const v=Number(n)||0;try{return v.toLocaleString('en-US',{style:'currency',currency:'USD',maximumFractionDigits:v%1?2:0})}catch{return '$'+Math.round(v)}}
function wonStats(){const won=(S.opps||[]).filter(o=>o.status==='Accepted'&&o.award_amount!=null&&o.award_amount!=='');const total=won.reduce((s,o)=>s+(Number(o.award_amount)||0),0);const wins=(S.opps||[]).filter(o=>o.status==='Accepted').length;return{total,wins,funded:won.length}}

// ── ACHIEVEMENTS & STREAKS ──────────────────────────────────────────────────
const ACHIEVEMENTS=[
  {id:'first_app',ic:'🌱',t:'First Step',d:'Log your first application',metric:'apps',goal:1},
  {id:'apps5',ic:'📨',t:'Getting Going',d:'5 applications submitted',metric:'apps',goal:5},
  {id:'apps10',ic:'🔥',t:'On a Roll',d:'10 applications submitted',metric:'apps',goal:10},
  {id:'apps25',ic:'💪',t:'Prolific',d:'25 applications submitted',metric:'apps',goal:25},
  {id:'win1',ic:'🎯',t:'First Win',d:'Win your first scholarship',metric:'wins',goal:1},
  {id:'win3',ic:'🏆',t:'Triple Crown',d:'3 scholarships won',metric:'wins',goal:3},
  {id:'win5',ic:'👑',t:'Champion',d:'5 scholarships won',metric:'wins',goal:5},
  {id:'m1k',ic:'💰',t:'First $1k',d:'$1,000 in winnings',metric:'money',goal:1000},
  {id:'m10k',ic:'💵',t:'$10k Club',d:'$10,000 in winnings',metric:'money',goal:10000},
  {id:'m25k',ic:'💎',t:'Gem',d:'$25,000 in winnings',metric:'money',goal:25000},
  {id:'m50k',ic:'🚀',t:'Sky High',d:'$50,000 in winnings',metric:'money',goal:50000},
  {id:'m100k',ic:'🌟',t:'Six Figures',d:'$100,000 in winnings',metric:'money',goal:100000},
  {id:'streak3',ic:'📅',t:'Consistent',d:'Submit on 3 days in a row',metric:'streak',goal:3},
  {id:'streak7',ic:'⚡',t:'Unstoppable',d:'Submit on 7 days in a row',metric:'streak',goal:7},
];
function computeStreak(apps){
  const days=[...new Set((apps||[]).map(a=>a.submitted_at).filter(Boolean))].sort();
  if(!days.length)return 0;
  let best=1,cur=1;
  for(let i=1;i<days.length;i++){const d0=new Date(days[i-1]+'T00:00:00'),d1=new Date(days[i]+'T00:00:00');
    if(Math.round((d1-d0)/86400000)===1){cur++;best=Math.max(best,cur)}else cur=1;}
  return best;
}
function achStats(){
  const ws=wonStats();
  const apps=(S.appStats&&S.appStats.total_applications)!=null?S.appStats.total_applications
    :(S.opps||[]).filter(o=>['Submitted','Accepted','Rejected','Deferred'].includes(o.status)).length;
  return{apps,wins:ws.wins,money:ws.total,streak:computeStreak(S.applications)};
}
function computeAchievements(){const st=achStats();return ACHIEVEMENTS.map(a=>{const v=st[a.metric]||0;return{...a,value:v,unlocked:v>=a.goal,pct:Math.min(100,Math.round(v/a.goal*100))}})}
// Toast when newly-unlocked since last visit (first-ever load is summarized, not spammed).
function checkAchievements(){
  try{
    const seen=new Set(JSON.parse(localStorage.getItem('ot_ach_seen')||'[]'));
    const fresh=computeAchievements().filter(a=>a.unlocked&&!seen.has(a.id));
    if(!fresh.length)return;
    fresh.forEach(a=>seen.add(a.id));
    localStorage.setItem('ot_ach_seen',JSON.stringify([...seen]));
    if(seen.size>fresh.length && fresh.length<=3)fresh.forEach(a=>toast('ok',a.ic+' Achievement unlocked: '+a.t));
    else toast('ok','🏅 '+fresh.length+' achievement'+(fresh.length>1?'s':'')+' unlocked!');
  }catch(e){}
}
function buildAchievementsModal(){
  const ov=mkOv();const modal=h('div',{className:'modal w'});

  modal.appendChild(h('div',{className:'mhdr'},h('div',{},h('div',{className:'mt2'},'🏅 Achievements'),h('div',{className:'ms'},un+' of '+list.length+' unlocked')),h('button',{className:'mcl',onClick:closeModal},'×')));
  const body=h('div',{className:'mbody'});const grid=h('div',{className:'ach-grid'});
  list.forEach(a=>{
    const card=h('div',{className:'ach-card'+(a.unlocked?' on':'')});
    card.appendChild(h('div',{className:'ach-ic'},a.ic));

// Arrow / Page / Home-End keyboard scrolling (skips form fields).
function onKeyScroll(e){

  if(e.ctrlKey||e.metaKey||e.altKey)return;
  const mb=document.querySelector('.modal .mbody');
  let scroller=(mb&&mb.scrollHeight>mb.clientHeight+1)?mb:(document.querySelector('.main')||document.scrollingElement||document.documentElement);
  if(!scroller||scroller.scrollHeight<=scroller.clientHeight+1)scroller=document.scrollingElement||document.documentElement;

  let handled=true;
  switch(e.key){
    case 'ArrowDown':scroller.scrollTop+=line;break;
    case 'ArrowUp':scroller.scrollTop-=line;break;
    case 'PageDown':scroller.scrollTop+=page;break;
    case 'PageUp':scroller.scrollTop-=page;break;
    case 'Home':scroller.scrollTop=0;break;
    case 'End':scroller.scrollTop=scroller.scrollHeight;break;

      const bursts=big?5:3, per=Math.round((big?260:130)/bursts);

    } else {

        const a=-Math.PI/2+(Math.random()-0.5)*1.7,v=(big?10:7.5)*(0.55+Math.random()*0.75);
        parts.push({x:o[0],y:o[1],vx:Math.cos(a)*v,vy:Math.sin(a)*v,rot:Math.random()*Math.PI,vr:(Math.random()-0.5)*0.4,
          wd:4+Math.random()*5,ht:6+Math.random()*7,col:pal[(Math.random()*pal.length)|0]||'#f0b429',circ:Math.random()<0.3,
          emo:EMO[(Math.random()*EMO.length)|0],sz:16+Math.random()*13});}});
    }
    const grav=style==='fireworks'?0.12:0.18,dur=style==='money'?(big?3400:2600):(big?2600:1900),drag=0.992;let start=null;
    function frame(ts){
      if(start==null)start=ts;const el=ts-start;ctx.clearRect(0,0,w,h);
      const fade=el>dur*0.6?Math.max(0,1-(el-dur*0.6)/(dur*0.4)):1;

function reportClientError(where,err){
  try{fetch('/api/clientlog',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({where,message:(err&&err.message)||String(err),stack:(err&&err.stack)||''})})}catch(_){}
}
function render(){
  const app=document.getElementById('app');
  let next;
  try{
    next=buildApp();           // build FIRST — if this throws, the old DOM is untouched (no blank freeze)
  }catch(err){
    console.error('Render error:',err);
    reportClientError('render',err);
    const old=document.getElementById('__errbar');if(old)old.remove();
    const bar=document.createElement('div');bar.id='__errbar';
    bar.style.cssText='position:fixed;top:0;left:0;right:0;z-index:9999;background:#b00020;color:#fff;padding:9px 14px;font:12px/1.4 monospace;cursor:pointer';
    bar.textContent='⚠ Display error: '+((err&&err.message)||err)+'  — tap to dismiss';
    bar.addEventListener('click',()=>{S.modal=null;bar.remove();render()});
    document.body.appendChild(bar);
    return;                    // keep the last good screen instead of clearing it
  }
  app.innerHTML='';
  app.appendChild(next);
  // A clean render means we've recovered — clear any leftover error banner so a
  // transient failure (e.g. a brief server outage) doesn't leave the screen stuck red.
  const stale=document.getElementById('__errbar');if(stale)stale.remove();
}

function buildOppCard(o){

  else if(o.status==='Accepted')stripe='s3';
  else if(o.status==='Rejected')stripe='s4';
  else if(d!==null&&d<0)stripe='s1';

  else stripe='s0';
  const card=h('div',{className:`ocard ${stripe}`,onClick:()=>openDetail(o)});
  const left=h('div',{});
  if(o.missed)left.appendChild(h('div',{style:'display:flex;align-items:center;gap:6px;font-size:11px;color:var(--miss);background:rgba(185,124,252,.1);border:1px solid rgba(185,124,252,.18);border-radius:4px;padding:4px 8px;margin-bottom:7px;width:fit-content'},'📌','Watching for next cycle'));
  left.appendChild(h('div',{className:'on2'},o.name));
  if(o.description)left.appendChild(h('div',{className:'od'},o.description));
  const meta=h('div',{className:'om'});
  meta.appendChild(mk.badge(o.status));
  const eb=eligBadge(o);if(eb)meta.appendChild(eb);
  if(o.missed)meta.appendChild(mk.tag('📌 watch','tag-m'));else if(o.recurring)meta.appendChild(mk.tag('↺ recurring','tag-r'));
  if(isRemote(o))meta.appendChild(mk.tag('remote','tag-remote'));
  (o.tags||[]).filter(t=>!['remote','virtual','online'].includes(t)).slice(0,3).forEach(t=>meta.appendChild(mk.tag(t)));
  if(o.url)meta.appendChild(h('span',{className:'ourl'},o.url.replace(/^https?:\/\//,'')));
  left.appendChild(meta);card.appendChild(left);
  const right=h('div',{className:'or'});

// -- DEADLINE-RISK (Triage): rank active opps by time-left vs work-remaining --
function riskOf(o){
  const dl=du(o.deadline);
  if(dl===null)return null;
  const st=o.status||'Not Started';
  if(o.missed||['Submitted','Accepted','Rejected','Deferred','Missed'].includes(st))return null;
  if(dl<-14)return null;
  const essays=Math.max(0,o.essay_count||0), letters=Math.max(0,o.lor_count||0);
  const stWeight=st==='Not Started'?1:0.4;
  const workUnits=essays*1+letters*0.6+stWeight;
  const score=dl<0?100:Math.min(100,Math.round(workUnits*70/Math.max(dl,1)));
  const tier=score>=66?['High','var(--red)']:score>=33?['Medium','var(--orange)']:['Low','var(--green)'];
  return {dl,score,tier,essays,letters,st};
}

    {key:'name',label:'Name',ph:'Dr. Jane Smith'},{key:'title',label:'Title',ph:'Professor of Biology'},
    {key:'organization',label:'Organization',ph:'UNC Chapel Hill'},{key:'relationship',label:'Relationship',ph:'Research advisor'},
    {key:'email',label:'Email',ph:'jsmith@unc.edu'},{key:'phone',label:'Phone',ph:'(555) 123-4567'}],
    ()=>({name:'',title:'',organization:'',relationship:'',email:'',phone:''}),'references');

  // ── Demographics (optional) ──
  SEC('🧩 Demographics (optional)','Some applications ask these — all optional, stored only on your device');
  GRID(selF('Gender','gender',['Woman','Man','Non-binary','Prefer to self-describe','Prefer not to say']),
    selF('Race / ethnicity','race_ethnicity',['American Indian or Alaska Native','Asian','Black or African American','Hispanic or Latino','Native Hawaiian or Pacific Islander','White','Two or more races','Prefer not to say']),
    selF('Hispanic / Latino','hispanic_latino',['Yes','No','Prefer not to say']),
    selF('First-generation college student','first_generation',['Yes','No','Prefer not to say']),
    selF('Veteran status','veteran_status',['Not a veteran','Veteran','Active duty','Prefer not to say']),
    selF('Disability status','disability_status',['Yes','No','Prefer not to say']),
    selF('Pell Grant eligible','pell_eligible',['Yes','No','Unsure','Prefer not to say']),
    selF('Household income range','household_income_range',['Under $30k','$30k–$60k','$60k–$100k','$100k–$150k','Over $150k','Prefer not to say']));

  // ── Financial aid (optional) ──
  SEC('💰 Financial Aid (optional)','Scholarship & need-based application fields — stored only on your device');
  GRID(selF('Dependency status','dependency_status',['Dependent','Independent','Unsure']),
    tf('Household size','household_size','4'),
    tf('FAFSA EFC / SAI','efc_sai','e.g. 4500'),
    selF('Demonstrates financial need','financial_need',['Yes','No','Unsure','Prefer not to say']));

  // ── Parent / guardian (optional) ──
  SEC('👨‍👩‍👧 Parent / Guardian (optional)','Often required on high-school & first-generation scholarship applications');
  GRID(tf('Parent / guardian name','parent_guardian_name','Pat Doe'),
    tf('Parent / guardian email','parent_guardian_email','pat@email.com',{type:'email'}),
    tf('Parent / guardian phone','parent_guardian_phone','(555) 987-6543',{type:'tel'}),
    selF('Parent education level','parent_education_level',['Did not finish high school','High school diploma / GED','Some college','Associate degree','Bachelor\'s degree','Graduate degree','Unknown']),
    tf('Parent occupation','parent_occupation','Nurse',{full:true}));

  // ── Availability & logistics ──
  SEC('🗓 Availability & Logistics','For internships, jobs & start-date questions');
  GRID(tf('Available / start date','availability_date','',{type:'date'}),
    selF('Willing to relocate','willing_to_relocate',['Yes','No','Depends on opportunity','Remote only']));

  // ── Emergency contact & personal ──
  SEC('🆘 Emergency Contact & Personal');
  GRID(tf('Emergency contact name','emergency_contact_name','Pat Doe'),
    tf('Relationship','emergency_contact_relationship','Parent'),
    tf('Emergency contact phone','emergency_contact_phone','(555) 987-6543',{full:true}),
    tf('Hobbies & interests','hobbies','Hiking, piano, chess…',{full:true}));

  // ── Statements & essays ──
  SEC('📝 Statements & Essays','Reusable long-form answers; also seed outreach emails');
  GRID(taf('Personal statement','personal_statement','Your core personal statement / statement of purpose…',5),
    taf('Research statement','research_statement','Research interests and goals…',4),
    taf('Career goals','career_goals','Short- and long-term goals…',4),
    taf('Diversity statement','diversity_statement','Contributions to diversity & inclusion…',4),
    taf('Experience summary','experience_summary','Brief summary used to auto-draft outreach emails…',3,'Short, used when generating lab/faculty outreach emails'));

  modal.appendChild(body);

  // ── Save ──
  const toArr=s=>typeof s==='string'?s.split(',').map(t=>t.trim()).filter(Boolean):(Array.isArray(s)?s:[]);
  const cleanList=(arr,keys)=>arr.filter(o=>keys.some(k=>(o[k]||'').toString().trim()));
  const save=async()=>{
    try{
      const profilePayload={name:w.full_name||null,education_level:w.education_level||null,
        interests:toArr(w.interests),preferred_regions:toArr(w.preferred_regions),
        prefer_remote:!!w.prefer_remote,experience_summary:w.experience_summary||null,
        education_stage:w.education_stage||null,enrollment_status:w.enrollment_status||null,
        military_status:w.military_status||null,opportunity_types:Array.isArray(w.opportunity_types)?w.opportunity_types:[]};
      const piPayload={};PI_SCALARS.forEach(k=>{piPayload[k]=w[k]||null});
      piPayload.skills=toArr(w.skills);
      piPayload.languages=cleanList(w.languages,['language','proficiency']);
      piPayload.work_experience=cleanList(w.work_experience,['title','organization','description']);
      piPayload.research_experience=cleanList(w.research_experience,['title','organization','description']);
      piPayload.activities=cleanList(w.activities,['name','role','description']);
      piPayload.awards=cleanList(w.awards,['name','issuer','description']);
      piPayload.publications=cleanList(w.publications,['title','venue','authors']);
      piPayload.test_scores=cleanList(w.test_scores,['test','score']);
      piPayload.certifications=cleanList(w.certifications,['name','issuer']);
      piPayload.volunteer=cleanList(w.volunteer,['organization','role','description']);
      piPayload.references=cleanList(w.references,['name','email','organization']);
      await Promise.all([api('POST','/api/profile',profilePayload),api('POST','/api/personal-info',piPayload)]);
      toast('ok','Profile saved');closeModal();loadProfile();loadPersonalInfo();loadEligibilityScreen();
    }catch(e){toast('err',e.message)}
  };
  const foot=h('div',{className:'mfoot'});foot.appendChild(h('button',{className:'btn btn-ghost',onClick:closeModal},'Cancel'));foot.appendChild(h('button',{className:'btn btn-primary',onClick:save},'Save Profile'));modal.appendChild(foot);ov.appendChild(modal);return ov;
}

// Guided, conversational setup — personalized questions whose answers fill the profile.
function buildProfileGuideModal(){
  const p=S.profile||{}, pi=S.personalInfo||{};
  const ov=mkOv();const modal=h('div',{className:'modal xl'});
  modal.appendChild(h('div',{className:'mhdr'},h('div',{className:'mt2'},'🧭 Guided Profile Setup'),h('button',{className:'mcl',onClick:closeModal},'×')));
  const body=h('div',{className:'mbody'});
  body.appendChild(h('div',{className:'call call-i',style:'margin-bottom:8px'},'Answer as many as you like and we\'ll turn it into a filled-in profile — skip anything that doesn\'t apply, and you can edit everything afterward. Your free-text answer is parsed locally to fill extra fields.'));
  const g={};
  const Q=(q,hint)=>body.appendChild(h('div',{style:'margin:16px 0 6px'},h('div',{style:'font-size:13px;font-weight:600;color:var(--text)'},q),hint?h('div',{style:'font-size:11px;color:var(--muted);margin-top:2px'},hint):null));
  const inp=(key,ph,val)=>{const i=h('input',{className:'fi',placeholder:ph||'',value:val||''});g[key]=val||'';i.addEventListener('input',e=>{g[key]=e.target.value});return i};
  const ta=(key,ph,rows,val)=>{const t=h('textarea',{className:'fta',rows:rows||3,placeholder:ph||''});t.value=val||'';g[key]=val||'';t.addEventListener('input',e=>{g[key]=e.target.value});return t};
  const row=(...kids)=>{const d=h('div',{className:'fgrid'});kids.forEach(k=>d.appendChild(h('div',{className:'fg'},k)));body.appendChild(d)};
  const full=k=>body.appendChild(h('div',{className:'fgrid'},h('div',{className:'fg full'},k)));

  Q("Let's start simple — what's your full name?");
  full(inp('full_name','Jane A. Doe', pi.full_name||p.name));
  Q('How can programs reach you?');
  row(inp('email','jane@email.com', pi.email), inp('phone','(555) 123-4567', pi.phone));
  Q('Where are you based?');
  body.appendChild(h('div',{className:'fgrid'},h('div',{className:'fg'},inp('city','City', pi.city)),h('div',{className:'fg'},inp('state','State / Province', pi.state)),h('div',{className:'fg'},inp('country','Country', pi.country))));
  Q('Where do you study, and when will you graduate?');
  row(inp('university','Your school', pi.university), inp('graduation_year','2027', pi.graduation_year));
  Q("What are you studying, and what's your GPA?");
  row(inp('major','Your major', pi.major), inp('gpa','3.8', pi.gpa));
  Q('In a few sentences, tell us about yourself.','Your background, what drives you, and your goals. We\'ll auto-extract extra details (school, GPA, links, languages…) from this.');
  full(ta('about_me','Write freely…',5, pi.about_me));
  Q('A few activities or leadership roles you\'re proud of?','One per line.');
  full(ta('activities_text','President, Student Government\nVolunteer, Local Clinic',3));
  Q('Any awards or honors?','One per line.');
  full(ta('awards_text','Dean\'s List\nNational Merit Finalist',3));
  Q('What are your strongest skills?','Comma separated.');
  full(inp('skills','Python, public speaking, Spanish'));
  Q('What kinds of opportunities are you looking for?','Comma-separated interests — these tune which opportunities rank highest for you.');
  full(inp('interests','premed, research, global health, remote'));

  modal.appendChild(body);
  const finish=async()=>{
    try{
      const toArr=s=>(s||'').split(',').map(x=>x.trim()).filter(Boolean);
      const lines=s=>(s||'').split('\n').map(x=>x.trim()).filter(Boolean);
      let sug={};
      if((g.about_me||'').trim().length>15){try{const r=await api('POST','/api/personal-info/extract',{text:g.about_me});sug=r.suggestions||{}}catch(e){}}
      const pick=k=>g[k]||sug[k]||pi[k]||null;       // answered > extracted > existing > null
      const piPayload={
        full_name:pick('full_name'),email:pick('email'),phone:pick('phone'),
        city:pick('city'),state:pick('state'),country:pick('country'),
        university:pick('university'),graduation_year:pick('graduation_year'),
        major:pick('major'),gpa:pick('gpa'),
        degree_type:sug.degree_type||pi.degree_type||null,
        linkedin_url:sug.linkedin_url||pi.linkedin_url||null,
        github_url:sug.github_url||pi.github_url||null,
        about_me:g.about_me||pi.about_me||null,
      };
      const skillSet=[...new Set([...(pi.skills||[]),...toArr(g.skills),...(sug.skills||[])])];
      if(skillSet.length)piPayload.skills=skillSet;
      if(sug.languages)piPayload.languages=[...(pi.languages||[]),...sug.languages.filter(s=>!(pi.languages||[]).some(l=>(l.language||'').toLowerCase()===(s.language||'').toLowerCase()))];
      const acts=lines(g.activities_text).map(t=>({name:t,role:'',dates:'',hours:'',description:''}));
      const aws=lines(g.awards_text).map(t=>({name:t,issuer:'',year:'',description:''}));
      if(acts.length)piPayload.activities=[...(pi.activities||[]),...acts];
      if(aws.length)piPayload.awards=[...(pi.awards||[]),...aws];
      const ints=toArr(g.interests);
      const profilePayload={name:pick('full_name'),interests:ints.length?ints:(p.interests||[]),
        education_level:p.education_level||null,prefer_remote:!!p.prefer_remote,
        preferred_regions:p.preferred_regions||[],experience_summary:p.experience_summary||null};
      await Promise.all([api('POST','/api/profile',profilePayload),api('POST','/api/personal-info',piPayload)]);
      toast('ok','Profile updated from your answers');closeModal();loadProfile();loadPersonalInfo();loadEligibilityScreen();
    }catch(e){toast('err',e.message)}
  };
  const foot=h('div',{className:'mfoot'});foot.appendChild(h('button',{className:'btn btn-ghost',onClick:closeModal},'Cancel'));foot.appendChild(h('button',{className:'btn btn-primary',onClick:finish},'Build my profile'));modal.appendChild(foot);ov.appendChild(modal);return ov;
}

function buildAppModal(){
  const f=S.appForm||{};const ov=mkOv();const modal=h('div',{className:'modal'});
  modal.appendChild(h('div',{className:'mhdr'},h('div',{className:'mt2'},f.id?'✏ Edit Application':'📨 Log Application'),h('button',{className:'mcl',onClick:closeModal},'×')));
  const body=h('div',{className:'mbody'});const grid=h('div',{className:'fgrid'});
  // Opportunity selector
  const og=h('div',{className:'fg full'});og.appendChild(h('label',{className:'fl'},'Opportunity'));
  const sel=h('select',{className:'fi'});
  sel.appendChild(h('option',{value:''},'— Not in tracker (type a name) —'));
  (S.opps||[]).forEach(o=>{const opt=h('option',{value:String(o.id)},o.name);if(f.opportunity_id===o.id)opt.selected=true;sel.appendChild(opt)});
  sel.addEventListener('change',e=>{const v=e.target.value;if(v){const o=(S.opps||[]).find(x=>String(x.id)===v);ss({appForm:{...S.appForm,opportunity_id:o.id,opportunity_name:o.name}})}else{ss({appForm:{...S.appForm,opportunity_id:null}})}});
  og.appendChild(sel);grid.appendChild(og);
  // Free-text name (used when not linked to a tracked opportunity)
  if(!f.opportunity_id){const ng=h('div',{className:'fg full'});ng.appendChild(h('label',{className:'fl'},'Opportunity name *'));const ni=h('input',{className:'fi',value:f.opportunity_name||'',placeholder:'e.g. External Grant'});ni.addEventListener('input',e=>af('opportunity_name',e.target.value));ng.appendChild(ni);grid.appendChild(ng)}
  // Outcome
  const oc=h('div',{className:'fg'});oc.appendChild(h('label',{className:'fl'},'Outcome'));const ocs=h('select',{className:'fi'});S.appOutcomes.forEach(o=>{const opt=h('option',{value:o},o);if(f.outcome===o)opt.selected=true;ocs.appendChild(opt)});ocs.addEventListener('change',e=>af('outcome',e.target.value));oc.appendChild(ocs);grid.appendChild(oc);
  // Submitted date
  const dg=h('div',{className:'fg'});dg.appendChild(h('label',{className:'fl'},'Submitted date'));const di=h('input',{className:'fi',type:'date',value:f.submitted_at||''});di.addEventListener('input',e=>af('submitted_at',e.target.value));dg.appendChild(di);grid.appendChild(dg);
  // Confirmation
  const cg=h('div',{className:'fg full'});cg.appendChild(h('label',{className:'fl'},'Confirmation # / receipt'));const ci=h('input',{className:'fi',value:f.confirmation||'',placeholder:'Optional'});ci.addEventListener('input',e=>af('confirmation',e.target.value));cg.appendChild(ci);grid.appendChild(cg);
  // Notes
  const ntg=h('div',{className:'fg full'});ntg.appendChild(h('label',{className:'fl'},'Notes'));const nt=h('textarea',{className:'fta',rows:2,placeholder:'What you submitted, anything to remember…'});nt.value=f.notes||'';nt.addEventListener('input',e=>af('notes',e.target.value));ntg.appendChild(nt);grid.appendChild(ntg);
  // Feedback
  const fbg=h('div',{className:'fg full'});fbg.appendChild(h('label',{className:'fl'},'Decision feedback'));const fb=h('textarea',{className:'fta',rows:2,placeholder:'Reviewer feedback after a decision (optional)'});fb.value=f.feedback||'';fb.addEventListener('input',e=>af('feedback',e.target.value));fbg.appendChild(fb);grid.appendChild(fbg);
  body.appendChild(grid);
  body.appendChild(h('div',{style:'font-size:10.5px;color:var(--muted);margin-top:8px'},'Outcomes (Submitted/Accepted/Rejected/…) sync to the opportunity\'s status when it\'s linked.'));
  modal.appendChild(body);
  const foot=h('div',{className:'mfoot'});foot.appendChild(h('button',{className:'btn btn-ghost',onClick:closeModal},'Cancel'));const sv=h('button',{className:'btn btn-primary',disabled:S.saving,onClick:saveApplication});sv.innerHTML=S.saving?'<span class="spin"></span>':(f.id?'Save':'Log Application');foot.appendChild(sv);modal.appendChild(foot);ov.appendChild(modal);return ov;
}
