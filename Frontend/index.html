<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Opportunity Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#09090f;--surface:#0f1018;--card:#141620;--card2:#191c27;--card3:#1e2133;--border:#1d202e;--border2:#252840;--text:#e2ddd6;--dim:#6b6760;--muted:#38363b;--accent:#f0b429;--a2:#ffd166;--green:#26c486;--red:#e84545;--blue:#4a94e8;--purple:#9d71e8;--orange:#f08c28;--teal:#20c0a0;--miss:#b97cfc;--r:8px;--rsm:5px;--rlg:12px;--shadow:0 4px 24px rgba(0,0,0,.6);--tl-label-w:160px}
@media(max-width:720px){:root{--tl-label-w:108px}}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{color-scheme:dark}
body{background:var(--bg);color:var(--text);font-family:var(--ui-font,'DM Sans',system-ui,sans-serif);font-size:13.5px;line-height:1.6;min-height:100vh;overflow-x:hidden}
html{scrollbar-color:var(--border2) transparent}::-webkit-scrollbar{width:var(--sb-w,11px);height:var(--sb-w,11px)}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:8px;border:2px solid transparent;background-clip:padding-box}::-webkit-scrollbar-thumb:hover{background:var(--dim);border:2px solid transparent;background-clip:padding-box}
.topbar{min-height:50px;display:flex;align-items:center;padding:6px 16px;gap:8px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.brand{display:flex;align-items:center;gap:8px;flex-shrink:0}
.mark{width:26px;height:26px;background:var(--accent);border-radius:5px;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;color:#09090f}
.brand-name{font-size:14px;font-weight:600;letter-spacing:-.3px}
.sep{width:1px;height:18px;background:var(--border2);flex-shrink:0}
.nav{display:flex;flex-wrap:wrap;gap:1px 2px;flex:1;align-content:center}
.nb{padding:5px 10px;border-radius:var(--rsm);cursor:pointer;font-size:12px;font-weight:500;color:var(--dim);white-space:nowrap;transition:all .15s;border:none;background:none;font-family:'DM Sans',sans-serif}
.nb:hover{color:var(--text);background:var(--card2)}.nb.on{color:var(--accent);background:var(--card2);box-shadow:inset 0 -2px 0 var(--accent)}
.segbar{display:inline-flex;gap:3px;padding:3px;margin-bottom:14px;background:var(--card2);border:1px solid var(--border);border-radius:var(--r)}
.segbtn{padding:6px 14px;border-radius:var(--rsm);cursor:pointer;font-size:12.5px;font-weight:500;color:var(--dim);white-space:nowrap;border:none;background:none;transition:all .15s;font-family:'DM Sans',sans-serif}
.segbtn:hover{color:var(--text)}.segbtn.on{color:#fff;background:var(--accent)}
.tb-right{display:flex;gap:6px;flex-shrink:0}
.layout{display:flex;height:calc(100vh - 50px)}
.sidebar{width:182px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);padding:10px 7px;overflow-y:auto}
.slbl{font-size:9px;font-weight:600;color:var(--muted);letter-spacing:1.8px;text-transform:uppercase;padding:10px 9px 3px;font-family:'JetBrains Mono',monospace}
.sitem{display:flex;align-items:center;gap:7px;padding:7px 9px;border-radius:var(--rsm);cursor:pointer;color:var(--dim);font-size:12px;font-weight:500;transition:all .15s;user-select:none;border:1px solid transparent}
.sitem:hover{background:var(--card2);color:var(--text)}.sitem.on{background:var(--card2);color:var(--accent);border-color:var(--border2)}
.sitem.miss.on{color:var(--miss);border-color:rgba(185,124,252,.25)}
.sc{margin-left:auto;font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--muted);background:var(--bg);padding:1px 5px;border-radius:10px}
.sitem.on .sc{color:inherit;opacity:.7}.sitem.miss.on .sc{color:var(--miss);opacity:.9}
.main{flex:1;overflow-y:auto;padding:22px 26px;min-width:0}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:var(--rsm);border:none;cursor:pointer;font-size:12.5px;font-weight:500;font-family:'DM Sans',sans-serif;transition:all .15s;white-space:nowrap;text-decoration:none}
.btn-primary{background:var(--accent);color:#09090f}.btn-primary:hover{background:var(--a2)}
.btn-ghost{background:transparent;color:var(--dim);border:1px solid var(--border2)}.btn-ghost:hover{background:var(--card2);color:var(--text)}
.btn-danger{background:rgba(232,69,69,.1);color:var(--red);border:1px solid rgba(232,69,69,.3)}.btn-danger:hover{background:rgba(232,69,69,.18)}
.btn-green{background:var(--green);color:#09090f}.btn-green:hover{filter:brightness(1.1)}
.btn-purple{background:var(--purple);color:#fff}.btn-purple:hover{filter:brightness(1.1)}
.btn-miss{background:var(--miss);color:#09090f}.btn-miss:hover{filter:brightness(1.1)}
.btn-discover{background:linear-gradient(135deg,#4a94e8,#9d71e8);color:#fff;font-weight:600}.btn-discover:hover{filter:brightness(1.08)}
.btn-sm{padding:4px 10px;font-size:12px}.btn-xs{padding:2px 7px;font-size:11px}
.btn:disabled{opacity:.4;cursor:not-allowed;pointer-events:none}
/* Stats */
.sbar{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:18px}
.sc2{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px}
.sv{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:600;line-height:1;letter-spacing:-1px}
.sl{font-size:9.5px;color:var(--dim);margin-top:4px;text-transform:uppercase;letter-spacing:.8px}
.sv-a{color:var(--accent)}.sv-r{color:var(--red)}.sv-g{color:var(--green)}.sv-m{color:var(--miss)}.sv-b{color:var(--blue)}
/* Page header */
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;gap:10px;flex-wrap:wrap}
.pt{font-size:19px;font-weight:700;letter-spacing:-.5px}.ps{font-size:12px;color:var(--dim);margin-top:3px}
.pa{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
/* Filters */
.frow{display:flex;gap:7px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.sw{position:relative}.sico{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--dim);pointer-events:none}
.ib{background:var(--card);border:1px solid var(--border2);border-radius:var(--rsm);color:var(--text);font-family:'DM Sans',sans-serif;font-size:12.5px;outline:none;transition:border-color .15s}
.ib:focus{border-color:var(--accent)}.ib::placeholder{color:var(--muted)}
.si2{padding:6px 10px 6px 28px;width:210px}.ssel{padding:6px 10px;cursor:pointer}
/* Opp cards */
.olist{display:flex;flex-direction:column;gap:6px}
.ocard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;display:grid;grid-template-columns:1fr auto;gap:10px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.ocard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;transition:background .15s}
.ocard:hover{background:var(--card2);border-color:var(--border2);transform:translateY(-2px);box-shadow:0 7px 20px rgba(0,0,0,.28)}.ocard:hover::before{background:var(--accent)}
.ocard.s0::before{background:var(--accent)}.ocard.s1::before{background:var(--red)}.ocard.s2::before{background:var(--orange)}.ocard.s3::before{background:var(--green)}.ocard.s4::before{background:var(--muted)}.ocard.s5::before{background:var(--miss)}
/* Ranked card with tier badge */
.tier-badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:600;font-family:'JetBrains Mono',monospace;padding:2px 8px;border-radius:3px;white-space:nowrap}
.tb-gov{background:rgba(74,148,232,.12);color:var(--blue)}.tb-found{background:rgba(38,196,134,.12);color:var(--green)}.tb-ngo{background:rgba(157,113,232,.12);color:var(--purple)}.tb-uni{background:rgba(240,180,41,.1);color:var(--accent)}.tb-other{background:rgba(107,103,96,.1);color:var(--dim)}
/* Score bar */
.sbar2{display:flex;gap:2px;height:4px;border-radius:2px;overflow:hidden;margin-top:5px;width:100%}
.sb-prestige{background:var(--blue)}.sb-urgency{background:var(--accent)}.sb-remote{background:var(--green)}.sb-stack{background:var(--teal)}
/* Opp card inner */
.on2{font-size:13.5px;font-weight:600;letter-spacing:-.2px;margin-bottom:3px;line-height:1.3}
.od{font-size:11.5px;color:var(--dim);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.om{display:flex;flex-wrap:wrap;gap:5px;align-items:center;margin-top:7px}
.ourl{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px}
.or{display:flex;flex-direction:column;align-items:flex-end;gap:4px;min-width:88px}
.dlbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;font-family:'JetBrains Mono',monospace}
.dval{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;color:var(--accent);text-align:right;white-space:nowrap}
.dval.miss-c{color:var(--miss)}
.dchip{font-family:'JetBrains Mono',monospace;font-size:10px;padding:2px 6px;border-radius:3px;background:rgba(240,180,41,.1);color:var(--accent)}
.dchip.urg{background:rgba(240,140,40,.1);color:var(--orange)}.dchip.ov{background:rgba(232,69,69,.1);color:var(--red)}.dchip.miss-d{background:rgba(185,124,252,.1);color:var(--miss)}
/* Badges/tags */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:3px;font-size:10px;font-weight:600;font-family:'JetBrains Mono',monospace;letter-spacing:.3px;white-space:nowrap}
.bd{width:4px;height:4px;border-radius:50%;flex-shrink:0}
.b0{background:rgba(107,103,96,.12);color:var(--dim)}.b0 .bd{background:var(--dim)}
.b1{background:rgba(74,148,232,.12);color:var(--blue)}.b1 .bd{background:var(--blue)}
.b2{background:rgba(157,113,232,.12);color:var(--purple)}.b2 .bd{background:var(--purple)}
.b3{background:rgba(38,196,134,.12);color:var(--green)}.b3 .bd{background:var(--green)}
.b4{background:rgba(232,69,69,.12);color:var(--red)}.b4 .bd{background:var(--red)}
.b5{background:rgba(240,140,40,.12);color:var(--orange)}.b5 .bd{background:var(--orange)}
.b6{background:rgba(185,124,252,.1);color:var(--miss)}.b6 .bd{background:var(--miss)}
.tag{display:inline-block;padding:2px 7px;border-radius:3px;font-size:10.5px;font-family:'JetBrains Mono',monospace;background:rgba(74,148,232,.1);color:var(--blue)}
.tag-r{background:rgba(38,196,134,.1);color:var(--green)}.tag-m{background:rgba(185,124,252,.1);color:var(--miss)}.tag-remote{background:rgba(32,192,160,.1);color:var(--teal)}
/* Callouts */
.call{padding:10px 13px;border-radius:var(--rsm);font-size:12px;line-height:1.55;margin-bottom:14px}
.call-i{background:rgba(74,148,232,.07);border:1px solid rgba(74,148,232,.2);color:var(--blue)}
.call-g{background:rgba(38,196,134,.07);border:1px solid rgba(38,196,134,.2);color:var(--green)}
.call-w{background:rgba(240,140,40,.07);border:1px solid rgba(240,140,40,.2);color:var(--orange)}
.call-m{background:rgba(185,124,252,.08);border:1px solid rgba(185,124,252,.2);color:var(--miss)}
/* Kanban */
.kboard{display:grid;grid-template-columns:repeat(6,minmax(148px,1fr));gap:8px;overflow-x:auto;padding-bottom:6px}
.kcol{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:9px;min-height:300px;transition:background .15s}
.kcol.drag-over{background:rgba(240,180,41,.04);border-color:rgba(240,180,41,.3)}
.khdr{font-size:9.5px;font-weight:600;text-transform:uppercase;letter-spacing:.9px;margin-bottom:9px;padding-bottom:7px;border-bottom:1px solid var(--border2);display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace}
.kcard{background:var(--surface);border:1px solid var(--border2);border-radius:var(--rsm);padding:8px 9px;margin-bottom:5px;cursor:grab;transition:all .15s;font-size:12px}
.kcard:hover{background:var(--card3);border-color:var(--accent)}.kcard.dragging{opacity:.5}
.kcard-name{font-weight:600;line-height:1.3;margin-bottom:3px}
.kcard-dl{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--accent)}.kcard-dl.ov{color:var(--red)}
/* Timeline */
.tl-legend{display:flex;flex-wrap:wrap;gap:10px 14px;margin-bottom:12px;font-size:10.5px;color:var(--dim)}
.tl-leg{display:flex;align-items:center;gap:5px}
.tl-leg-dot{width:9px;height:9px;border-radius:3px;display:inline-block;flex-shrink:0}
.tl-wrap{overflow-x:auto;padding-bottom:10px}
.tl-c{position:relative;width:max-content;min-width:100%}
.tl-axis{display:flex;margin-bottom:6px;padding-bottom:6px;border-bottom:2px solid var(--border2)}
.tl-axis-sp{width:var(--tl-label-w);flex-shrink:0}
.tl-axis-track{display:flex;flex-shrink:0}
.tl-mo{flex-shrink:0;font-size:9.5px;color:var(--dim);text-align:left;padding-left:7px;font-family:'JetBrains Mono',monospace;border-left:1px solid var(--border);text-transform:uppercase;letter-spacing:.3px}
.tl-today{position:absolute;top:0;bottom:0;width:2px;background:var(--red);opacity:.7;pointer-events:none;z-index:3}
.tl-today-lbl{position:absolute;top:-1px;left:3px;font-size:8.5px;color:#fff;background:var(--red);padding:0 4px;border-radius:3px;white-space:nowrap;font-family:'JetBrains Mono',monospace;font-weight:600}
.tl-row{display:flex;align-items:center;height:32px}
.tl-row:nth-child(even of .tl-row){background:rgba(255,255,255,.012)}
.tl-name{width:var(--tl-label-w);flex-shrink:0;font-size:11.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:right;padding-right:11px;color:var(--text)}
.tl-track{position:relative;height:100%;flex-shrink:0;border-left:1px solid var(--border2)}
.tl-grid{position:absolute;top:0;bottom:0;width:1px;background:var(--border);opacity:.55;pointer-events:none}
.tl-bar{position:absolute;top:50%;transform:translateY(-50%);height:21px;min-width:56px;border-radius:var(--rsm);cursor:pointer;display:flex;align-items:center;gap:5px;padding:0 8px;font-size:10px;font-weight:600;white-space:nowrap;font-family:'JetBrains Mono',monospace;color:#09090f;box-shadow:0 1px 4px rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.16);transition:transform .12s,box-shadow .12s;z-index:1}
.tl-bar:hover{transform:translateY(-50%) scale(1.05);box-shadow:0 4px 12px rgba(0,0,0,.55);z-index:5}
.tl-bar-dot{width:6px;height:6px;border-radius:50%;background:rgba(9,9,15,.5);flex-shrink:0}
.tl-bar-od{border-style:dashed;border-color:rgba(255,255,255,.55);border-width:1.5px}
/* Money won — topbar chip + dashboard hero */
.won-chip{display:inline-flex;align-items:center;gap:6px;padding:4px 11px;border-radius:999px;border:1px solid color-mix(in srgb,var(--accent) 45%,transparent);background:color-mix(in srgb,var(--accent) 14%,transparent);color:var(--accent);font-weight:700;font-size:12.5px;cursor:pointer;white-space:nowrap;transition:all .15s;font-family:'DM Sans',sans-serif}
.won-chip:hover{background:color-mix(in srgb,var(--accent) 24%,transparent);transform:translateY(-1px)}
.won-chip-ic{font-size:13px}.won-chip-v{font-family:'JetBrains Mono',monospace;letter-spacing:-.3px}
.won-hero{position:relative;overflow:hidden;display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:14px;padding:18px 22px;border-radius:var(--rlg);border:1px solid color-mix(in srgb,var(--accent) 35%,var(--border2));background:linear-gradient(135deg,color-mix(in srgb,var(--accent) 22%,var(--card)),color-mix(in srgb,var(--purple) 16%,var(--card)) 130%);box-shadow:0 6px 22px rgba(0,0,0,.28)}
.won-hero-empty{background:var(--card);border-color:var(--border2)}
.won-hero-shine{position:absolute;top:0;left:-60%;width:45%;height:100%;background:linear-gradient(105deg,transparent,rgba(255,255,255,.13),transparent);transform:skewX(-18deg);animation:wshine 5.5s ease-in-out infinite;pointer-events:none}
@keyframes wshine{0%,72%{left:-60%}88%,100%{left:130%}}
.won-hero-main{position:relative;z-index:1;min-width:0}
.won-hero-lbl{font-size:12px;font-weight:600;color:var(--text);opacity:.82;letter-spacing:.2px;margin-bottom:3px}
.won-hero-amt{font-family:'JetBrains Mono',monospace;font-size:38px;font-weight:700;line-height:1.05;letter-spacing:-1px;color:var(--accent);text-shadow:0 1px 0 rgba(0,0,0,.25)}
.won-hero-side{position:relative;z-index:1;display:flex;flex-direction:column;align-items:flex-end;gap:4px;text-align:right;flex-shrink:0;max-width:230px}
.won-hero-stat{display:flex;flex-direction:column;align-items:center;padding:6px 14px;border-radius:var(--r);background:rgba(255,255,255,.07)}
.won-hero-sv{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:var(--text)}
.won-hero-sl{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--dim)}
.won-hero-note{font-size:10.5px;color:var(--dim);line-height:1.45}
@media(max-width:560px){.won-hero{flex-direction:column;align-items:flex-start}.won-hero-side{align-items:flex-start;text-align:left;max-width:none}.won-hero-amt{font-size:30px}}
/* Theme picker */
.tp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.tp-card{position:relative;border:1.5px solid var(--border2);border-radius:var(--r);padding:10px;cursor:pointer;background:var(--card);transition:transform .12s,border-color .12s}
.tp-card:hover{transform:translateY(-2px);border-color:var(--dim)}
.tp-card.on{border-color:var(--accent);box-shadow:0 0 0 2px color-mix(in srgb,var(--accent) 35%,transparent)}
.tp-prev{height:46px;border-radius:6px;display:flex;align-items:center;gap:5px;padding:7px;margin-bottom:8px;overflow:hidden}
.tp-sw{width:15px;height:15px;border-radius:5px;flex-shrink:0;box-shadow:0 0 0 1px rgba(0,0,0,.2)}
.tp-btn{margin-left:auto;font-size:9px;font-weight:700;padding:3px 8px;color:#09090f}
.tp-name{font-size:12.5px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:5px}
.tp-tag{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px}
.tp-check{position:absolute;top:7px;right:9px;color:var(--accent);font-size:13px;font-weight:700}
/* Customization controls */
.cz-sec{display:flex;align-items:baseline;gap:8px;margin:17px 0 9px;font-size:12px;font-weight:700;color:var(--text);padding-bottom:5px;border-bottom:1px solid var(--border)}
.cz-sec:first-child{margin-top:2px}
.cz-sub{font-size:10.5px;font-weight:400;color:var(--dim)}
.cz-row{display:flex;flex-wrap:wrap;gap:7px;align-items:center}
.cz-acc{width:26px;height:26px;border-radius:50%;border:2px solid var(--border2);cursor:pointer;padding:0;transition:transform .12s}
.cz-acc:hover{transform:scale(1.12)}
.cz-acc.on{border-color:var(--text);box-shadow:0 0 0 2px var(--bg),0 0 0 3px var(--text)}
.cz-cp{width:36px;height:30px;padding:2px;border:1px solid var(--border2);border-radius:var(--rsm);background:var(--card);cursor:pointer}
.cz-range{flex:1;min-width:170px;accent-color:var(--accent);cursor:pointer;height:22px}
.cz-spd{min-width:48px;text-align:right;font-family:'JetBrains Mono',monospace;font-size:12.5px;font-weight:600;color:var(--accent)}
.cz-adv{display:flex;align-items:center;justify-content:space-between;margin:18px 0 4px;padding:9px 12px;border:1px solid var(--border2);border-radius:var(--rsm);background:var(--card2);font-size:12px;font-weight:700;color:var(--text);cursor:pointer;user-select:none}
.cz-adv:hover{border-color:var(--dim)}
.cz-adv-caret{font-size:11px;color:var(--dim)}
.upd-banner{display:flex;align-items:center;gap:8px;padding:8px 16px;background:linear-gradient(90deg,color-mix(in srgb,var(--accent) 20%,var(--surface)),var(--surface));border-bottom:1px solid var(--border2);font-size:12.5px;color:var(--text)}
.upd-x{margin-left:auto;background:none;border:none;color:var(--dim);font-size:16px;cursor:pointer;line-height:1;padding:0 4px}
.upd-x:hover{color:var(--text)}
.tp-del{position:absolute;top:5px;left:6px;width:18px;height:18px;border-radius:50%;border:none;background:rgba(0,0,0,.35);color:#fff;font-size:13px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;opacity:.7}
.tp-del:hover{opacity:1;background:var(--red)}

function computeStreak(apps){
  const days=[...new Set((apps||[]).map(a=>a.submitted_at).filter(Boolean))].sort();
  if(!days.length)return 0;
  let best=1,cur=1;
  for(let i=1;i<days.length;i++){const d0=new Date(days[i-1]+'T00:00:00'),d1=new Date(days[i]+'T00:00:00');
    if(Math.round((d1-d0)/86400000)===1){cur++;best=Math.max(best,cur)}else cur=1;}
  return best;
}

let _wonLast=0;
function countUpEl(el,to){
  if(to===_wonLast){el.textContent=fmtMoney(to);return;}
  const from=_wonLast;_wonLast=to;const dur=750;let st=null;
  function step(ts){if(!el.isConnected)return;if(st==null)st=ts;const p=Math.min(1,(ts-st)/dur);
    el.textContent=fmtMoney(Math.round(from+(to-from)*(1-Math.pow(1-p,3))));if(p<1)requestAnimationFrame(step);}
  requestAnimationFrame(step);
}

// Capture the current resolved look (theme + accent/corner overrides) as a reusable named theme.
function saveCurrentAsTheme(){
  const name=(window.prompt&&window.prompt('Name this theme:','My Theme'))||'';
  if(!name.trim())return;
  const cs=getComputedStyle(document.documentElement);
  const vars={};TVARS.forEach(v=>{const val=cs.getPropertyValue(v).trim();if(val)vars[v]=val});
  // crude light/dark detection from background luminance
  let tag='dark';try{let c=(vars['--bg']||'#000').replace('#','');if(c.length===3)c=c.split('').map(x=>x+x).join('');const n=parseInt(c,16);const lum=(0.299*((n>>16)&255)+0.587*((n>>8)&255)+0.114*(n&255));tag=lum>140?'light':'dark'}catch(e){}
  const arr=loadCustomThemes();
  const key='custom-'+(arr.reduce((m,t)=>Math.max(m,Number((t.key||'').replace('custom-',''))||0),0)+1);
  arr.push({key,name:name.trim(),tag,mark:'🎨',vars,custom:true});
  saveCustomThemes(arr);setTheme(key);
}

  Object.entries(t.vars).forEach(([k,v])=>root.style.setProperty(k,v));

const PREF_DEFAULTS={accent:'',corners:'',font:'default',scale:100,motion:true,goal:0,tlMonths:7,density:'cozy',confettiStyle:'classic',sound:false,scrollSize:'default',scrollSpeed:1};
let PREFS={...PREF_DEFAULTS};
const CORNERS={sharp:['2px','1px','4px'],rounded:['9px','6px','13px'],pill:['16px','11px','22px']};
const UI_FONTS={default:"'DM Sans',system-ui,sans-serif",system:"system-ui,-apple-system,'Segoe UI',Roboto,sans-serif",serif:"Georgia,Cambria,'Times New Roman',serif",mono:"'JetBrains Mono',ui-monospace,monospace"};

function lightenHex(hex,amt){try{let c=String(hex).replace('#','');if(c.length===3)c=c.split('').map(x=>x+x).join('');const n=parseInt(c,16);let r=(n>>16)&255,g=(n>>8)&255,b=n&255;r=Math.min(255,Math.round(r+(255-r)*amt/100));g=Math.min(255,Math.round(g+(255-g)*amt/100));b=Math.min(255,Math.round(b+(255-b)*amt/100));return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1)}catch(e){return hex}}
function applyPrefOverrides(){
  const root=document.documentElement;
  if(PREFS.accent){root.style.setProperty('--accent',PREFS.accent);root.style.setProperty('--a2',lightenHex(PREFS.accent,18))}
  if(PREFS.corners&&CORNERS[PREFS.corners]){const c=CORNERS[PREFS.corners];root.style.setProperty('--r',c[0]);root.style.setProperty('--rsm',c[1]);root.style.setProperty('--rlg',c[2])}
  root.style.setProperty('--ui-font',UI_FONTS[PREFS.font]||UI_FONTS.default);
  root.setAttribute('data-density',PREFS.density||'cozy');
  const SBW={thin:'7px','default':'11px',large:'15px'};
  root.style.setProperty('--sb-w',SBW[PREFS.scrollSize]||SBW['default']);
  try{root.style.scrollbarWidth=(PREFS.scrollSize==='thin'?'thin':'auto')}catch(e){}
  const sc=Math.min(140,Math.max(80,Number(PREFS.scale)||100));
  try{document.body.style.zoom=sc/100}catch(e){}
}

function onWheel(e){
  const mult=Number(PREFS&&PREFS.scrollSpeed)||1;
  if(mult===1||e.ctrlKey||!e.deltaY)return;
  let el=e.target;

function du(iso){if(!iso||iso==='rolling')return null;const t=new Date();t.setHours(0,0,0,0);return Math.round((new Date(iso+'T00:00:00')-t)/86400000)}
function ocat(o){if(o.deadline==='rolling')return'rolling';if(!o.deadline)return'none';const t=new Date();t.setHours(0,0,0,0);return new Date(o.deadline+'T00:00:00')>=t?'upcoming':'past'}
function guessNext(anchor){if(!anchor||anchor==='rolling')return'';try{const d=new Date(anchor+'T00:00:00');d.setFullYear(d.getFullYear()+1);return d.toISOString().slice(0,10)}catch{return''}}
function isRemote(o){return(o.tags||[]).some(t=>['remote','virtual','online'].includes(t))||(o.description&&/remote|virtual/i.test(o.description))}

// ── Cross-cutting filter predicates (client-side, used by Dashboard + Discover) ──
// Field keyword groups keyed by persona id (kept in sync with each pack's field_signal).
// A listing may match several fields. Existing rows rarely carry field_* tags, so these
// keyword scans over name+description+tags are what make the Field filter work today.
const FIELD_KEYWORDS={
  engineering:/\b(engineer|software|computer science|robotics|machine learning|\bAI\b|data science|hardware|semiconductor|aerospace|electrical|mechanical|civil engineering|bioengineering)\b/i,
  business:/\b(business|finance|consulting|entrepreneur|startup|investment|venture capital|management|marketing|accounting|private equity|\bMBA\b)\b/i,
  law:/\b(law|legal|justice|judicial|civil rights|human rights|attorney|litigation|public interest|paralegal|pre-?law)\b/i,
  medicine:/\b(medic|clinical|biomedical|public health|health|epidemiolog|pre-?med|healthcare|patient|disease|nursing)\b/i,
  natural_sciences:/\b(physics|chemistr|biolog|mathematic|statistic|astronomy|astrophysics|geolog|ecolog|neuroscience|oceanograph|genetics)\b/i,
  arts_humanities:/\b(\bart\b|arts|design|music|theat(?:er|re)|film|creative writing|history|philosophy|literature|humanities|journalism|media|poetry)\b/i,
  social_sciences:/\b(econom|psycholog|sociolog|anthropolog|political science|international relations|geography|social science|behavioral)\b/i,
  education:/\b(education|teach\w*|curriculum|pedagog|literacy|classroom|stem education)\b/i,
  policy_undergrad:/\b(policy|public service|public policy|government|nonprofit|think tank|civic)\b/i,
};
function oppText(o){return((o.name||'')+' '+(o.description||'')+' '+((o.tags||[]).join(' '))).toLowerCase()}
// Modality: remote | hybrid | in-person | unknown (order matters; hybrid beats remote).
function oppModality(o){
  const loc=(o.location||'').toLowerCase(), txt=oppText(o);
  if((o.tags||[]).includes('hybrid')||/\bhybrid\b/.test(txt))return'hybrid';
  if(isRemote(o)||/^remote$|fully remote/.test(loc))return'remote';
  if((loc&&!/remote|virtual|online/.test(loc))||/\bin.?person\b|\bon.?site\b|on campus/.test(txt))return'in-person';
  return'unknown';
}
function oppFields(o){
  const txt=oppText(o), out=new Set();
  for(const id in FIELD_KEYWORDS){if(FIELD_KEYWORDS[id].test(txt))out.add(id)}
  (o.tags||[]).forEach(t=>{if(t.indexOf('field_')===0)out.add(t.slice(6))});
  return out;
}
const OPP_TYPES=[['scholarship','🎓 Scholarships'],['fellowship','🏅 Fellowships'],['internship','💼 Internships'],['grant','💰 Grants'],['conference','📣 Conferences'],['award','🏆 Awards']];
function oppType(o){
  const tags=o.tags||[], txt=oppText(o), out=new Set();
  OPP_TYPES.forEach(([t])=>{
    if(tags.includes(t)||new RegExp('\\b'+t,'i').test(txt))out.add(t);
  });
  if((tags.includes('prize')||/\bprize\b/i.test(txt)))out.add('award');
  return out;
}
const OPP_LEVELS=[['precollege','🎒 High School'],['undergraduate','🎓 Undergraduate'],['graduate','📚 Graduate'],['phd','🔬 PhD']];
// Academic level detection — mirrors the backend eligibility _LEVEL_PATTERNS. Returns a Set of
// levels the listing names; an EMPTY set means it doesn't specify a level (so it is NEVER
// filtered out by the level buttons — see matchesFilters).
const LEVEL_KEYWORDS={
  precollege:/\b(high\s+school|pre[\s-]?college|secondary\s+school|rising\s+(?:senior|junior)\s+in\s+high)\b/i,
  undergraduate:/\b(undergraduates?|undergrads?|bachelor'?s?|college\s+(?:sophomores?|juniors?|seniors?|freshm(?:a|e)n)|rising\s+(?:sophomores?|juniors?|seniors?))\b/i,
  graduate:/\b(graduate\s+students?|master'?s?\s+(?:students?|candidates?|degree)|\bMBA\b|grad\s+students?|currently\s+enrolled\s+in\s+a\s+(?:master|graduate))\b/i,
  phd:/\b(doctoral|ph\.?d\.?|postdoctoral|post[\s-]?docs?|dissertation)\b/i,
};
function oppLevel(o){
  const out=new Set(), tags=o.tags||[];
  ['precollege','undergraduate','graduate','phd'].forEach(l=>{if(tags.includes(l))out.add(l)});
  const txt=oppText(o);
  for(const l in LEVEL_KEYWORDS){if(LEVEL_KEYWORDS[l].test(txt))out.add(l)}
  return out;
}
function oppFunding(o){
  const tags=o.tags||[], txt=oppText(o), fee=(o.application_fee||'').toLowerCase();
  const funded=tags.includes('stipend')||tags.includes('paid')||/stipend|fully funded|\bfunded\b|\bpaid\b|salary/i.test(txt);
  const noFee=fee?/free|waiv|\$?0\b/.test(fee):/no application fee|free to apply|no fee to apply/i.test(txt);
  return{funded,noFee};
}
function filtersActive(){return !!(S.fModality||S.fField.length||S.fTypes.length||S.fFunding||S.fElig||S.fLevels.length)}
// Eligibility verdict for an opp: prefer one attached by Discover ranking, else the batch screen map.
function eligOf(o){return (o&&o.eligibility_check)||(S.eligMap&&o&&S.eligMap[String(o.id)])||null}
// Shared AND-chain used by both pages. Modality 'unknown' is excluded when a modality filter is set.
function matchesFilters(o,skipType){
  if(S.fModality&&oppModality(o)!==S.fModality)return false;
  if(S.fField.length){const f=oppFields(o);if(!S.fField.some(x=>f.has(x)))return false;}
  if(!skipType&&S.fTypes.length){const ty=oppType(o);if(!S.fTypes.some(x=>ty.has(x)))return false;}
  if(S.fLevels.length){const lv=oppLevel(o);if(lv.size&&!S.fLevels.some(x=>lv.has(x)))return false;}
  if(S.fFunding==='funded'&&!oppFunding(o).funded)return false;
  if(S.fFunding==='no-fee'&&!oppFunding(o).noFee)return false;
  if(S.fElig){const st=(eligOf(o)||{}).status;
    if(S.fElig==='eligible'&&st!=='eligible')return false;
    if(S.fElig==='hide-ineligible'&&st==='ineligible')return false;}
  return true;
}
// Eligibility badge from an opp's eligibility verdict (returns a node or null).
function eligBadge(o){const ec=eligOf(o);if(!ec||!ec.status||ec.status==='unknown')return null;
  const m={eligible:['✓ Eligible','rgba(32,192,160,.12)','var(--teal)'],maybe:['~ Check eligibility','rgba(230,180,60,.13)','#e6b43c'],ineligible:['✗ Likely ineligible','rgba(230,90,90,.13)','#e65a5a']}[ec.status];
  if(!m)return null;const tip=(ec.blockers||[]).concat(ec.reasons||[]).join(' ');
  return h('span',{className:'tier-badge',style:'background:'+m[1]+';color:'+m[2],title:tip||m[0]},m[0]);}

function h(tag,attrs,...ch){
  const el=document.createElement(tag);
  if(attrs)for(const[k,v]of Object.entries(attrs)){
    if(k==='className')el.className=v;
    else if(k.startsWith('on'))el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='style'&&typeof v==='string')el.style.cssText=v;
    else if(k==='checked')el.checked=!!v;
    else if(k==='disabled')el.disabled=!!v;
    else if(k==='value'&&['INPUT','SELECT','TEXTAREA'].includes(tag.toUpperCase()))el.value=v??'';
    else if(v!==null&&v!==undefined&&v!==false)el.setAttribute(k,v);
  }
  ch.flat(Infinity).forEach(c=>{if(c==null||c===false)return;el.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(String(c)):c)});
  return el;
}

function render(){

    next=buildApp();           // build FIRST — if this throws, the old DOM is untouched (no blank freeze)
  }catch(err){
    console.error('Render error:',err);
    reportClientError('render',err);
    const old=document.getElementById('__errbar');if(old)old.remove();
    const bar=document.createElement('div');bar.id='__errbar';
    bar.style.cssText='position:fixed;top:0;left:0;right:0;z-index:9999;background:#b00020;color:#fff;padding:9px 14px;font:12px/1.4 monospace;cursor:pointer';

    document.body.appendChild(bar);
    return;                    // keep the last good screen instead of clearing it
  }
  app.innerHTML='';
  app.appendChild(next);
  // A clean render means we've recovered — clear any leftover error banner so a
  // transient failure (e.g. a brief server outage) doesn't leave the screen stuck red.
  const stale=document.getElementById('__errbar');if(stale)stale.remove();

function truncate(str,n){str=String(str||'');return str.length>n?str.slice(0,n-1)+'…':str}
function hexA(hex,a){try{let c=String(hex).replace('#','');if(c.length===3)c=c.split('').map(x=>x+x).join('');const n=parseInt(c,16);return 'rgba('+((n>>16)&255)+','+((n>>8)&255)+','+(n&255)+','+a+')'}catch(e){return hex}}
function buildHeatmap(){
  const apps=S.applications||[];const counts={};let any=false;
  apps.forEach(a=>{if(a.submitted_at){counts[a.submitted_at]=(counts[a.submitted_at]||0)+1;any=true}});
  if(!any)return null;
  const today=new Date();today.setHours(0,0,0,0);const WEEKS=26;
  const startBack=new Date(today);startBack.setDate(startBack.getDate()-WEEKS*7);startBack.setDate(startBack.getDate()-startBack.getDay());
  let max=1;Object.values(counts).forEach(v=>{if(v>max)max=v});
  const iso=d=>d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  const cols=[];let col=[];
  for(let d=new Date(startBack);d<=today;d.setDate(d.getDate()+1)){
    const c=counts[iso(d)]||0;const lvl=c===0?0:(c>=max?4:Math.min(3,Math.ceil(c/max*3)));
    col.push({iso:iso(d),c,lvl});
    if(d.getDay()===6){cols.push(col);col=[]}
  }
  if(col.length)cols.push(col);
  const wrap=h('div',{className:'hm'});
  wrap.appendChild(h('div',{className:'hm-h'},h('span',{},'📊 Submission activity'),h('span',{className:'cz-sub'},'last 6 months')));
  const grid=h('div',{className:'hm-grid'});

  return wrap;
}

function buildTimeline(main){
  const winMonths=Math.max(2,Number(PREFS&&PREFS.tlMonths)||7);
  main.appendChild(h('div',{className:'ph'},h('div',{},h('div',{className:'pt'},'📆 Deadline Timeline'),h('div',{className:'ps'},'Upcoming deadlines · next '+winMonths+' months'))));
  const today=new Date();today.setHours(0,0,0,0);
  const start=new Date(today);start.setDate(1);
  const end=new Date(start);end.setMonth(end.getMonth()+winMonths);
  // Only deadlines that fall inside the visible window, soonest first.
  const opps=S.opps.filter(o=>{
    if(!o.deadline||o.deadline==='rolling'||o.missed)return false;
    const dl=new Date(o.deadline+'T00:00:00');return !isNaN(dl)&&dl>=start&&dl<=end;
  }).sort((a,b)=>a.deadline<b.deadline?-1:1);
  if(!opps.length)return main.appendChild(h('div',{className:'empty'},h('div',{className:'empty-icon'},'📆'),h('div',{className:'empty-title'},'No deadlines in the next '+winMonths+' months'),h('div',{className:'empty-sub'},'Opportunities with a dated deadline show up here.')));
  const months=[];for(let d=new Date(start);d<end;){months.push(new Date(d));d.setMonth(d.getMonth()+1)}
  const MONTH_W=120, trackW=months.length*MONTH_W;
  // Position by (month index + fraction-through-month) so bars land on the evenly-spaced month grid.
  const xFor=date=>{
    let mi=(date.getFullYear()-start.getFullYear())*12+(date.getMonth()-start.getMonth());
    mi=Math.max(0,Math.min(mi,months.length-1));
    const mStart=new Date(date.getFullYear(),date.getMonth(),1);
    const mEnd=new Date(date.getFullYear(),date.getMonth()+1,1);
    return (mi+(date-mStart)/(mEnd-mStart))*MONTH_W;
  };
  const fdShort=iso=>{try{return new Date(iso+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})}catch{return iso}};
  // Legend so the bar colors are decodable.
  const legend=h('div',{className:'tl-legend'});
  ['Not Started','In Progress','Submitted','Accepted','Rejected','Deferred'].forEach(st=>legend.appendChild(h('div',{className:'tl-leg'},h('span',{className:'tl-leg-dot',style:'background:'+(STATUS_COLORS[st]||'var(--accent)')}),st)));
  main.appendChild(legend);
  const wrap=h('div',{className:'tl-wrap'});
  const cont=h('div',{className:'tl-c'});
  // Axis: a spacer the width of the name column, then one fixed-width cell per month.
  const axis=h('div',{className:'tl-axis'});
  axis.appendChild(h('div',{className:'tl-axis-sp'}));
  const axTrack=h('div',{className:'tl-axis-track',style:`width:${trackW}px`});
  months.forEach(m=>axTrack.appendChild(h('div',{className:'tl-mo',style:`width:${MONTH_W}px`},m.toLocaleDateString('en-US',{month:'short',year:'2-digit'}))));
  axis.appendChild(axTrack);cont.appendChild(axis);
  // One row per opportunity: fixed name column + a track with month gridlines and the deadline bar.
  opps.forEach(o=>{
    const dl=new Date(o.deadline+'T00:00:00');
    const overdue=dl<today;
    const row=h('div',{className:'tl-row'});
    row.appendChild(h('div',{className:'tl-name',title:o.name},o.name));
    const track=h('div',{className:'tl-track',style:`width:${trackW}px`});
    months.forEach((m,mi)=>{if(mi)track.appendChild(h('div',{className:'tl-grid',style:`left:${mi*MONTH_W}px`}))});
    const x=Math.min(xFor(dl),trackW-58); // keep the bar from overflowing the right edge
    const bar=h('div',{className:'tl-bar'+(overdue?' tl-bar-od':''),style:`left:${Math.max(0,x)}px;background:${STATUS_COLORS[o.status]||'var(--accent)'}`,title:o.name+' — '+fd(o.deadline)+(overdue?' (overdue)':''),onClick:()=>openDetail(o)},
      h('span',{className:'tl-bar-dot'}),fdShort(o.deadline));
    track.appendChild(bar);row.appendChild(track);cont.appendChild(row);
  });
  // "Today" marker — spans the full grid; offset by the name column so it lines up with the bars.
  if(today>=start&&today<=end){
    const tl=h('div',{className:'tl-today',style:`left:calc(var(--tl-label-w) + ${xFor(today)}px)`});
    tl.appendChild(h('span',{className:'tl-today-lbl'},'Today'));cont.appendChild(tl);
  }
  wrap.appendChild(cont);main.appendChild(wrap);
}

// -- DEADLINE-RISK (Triage): rank active opps by time-left vs work-remaining --
function riskOf(o){
  const dl=du(o.deadline);
  if(dl===null)return null;
  const st=o.status||'Not Started';
  if(o.missed||['Submitted','Accepted','Rejected','Deferred','Missed'].includes(st))return null;
  if(dl<-14)return null;
  const essays=Math.max(0,o.essay_count||0), letters=Math.max(0,o.lor_count||0);
  const stWeight=st==='Not Started'?1:0.4;
  const workUnits=essays*1+letters*0.6+stWeight;
  const score=dl<0?100:Math.min(100,Math.round(workUnits*70/Math.max(dl,1)));
  const tier=score>=66?['High','var(--red)']:score>=33?['Medium','var(--orange)']:['Low','var(--green)'];
  return {dl,score,tier,essays,letters,st};
}

function buildProfileGuideModal(){
  const p=S.profile||{}, pi=S.personalInfo||{};
  const ov=mkOv();const modal=h('div',{className:'modal xl'});
  modal.appendChild(h('div',{className:'mhdr'},h('div',{className:'mt2'},'🧭 Guided Profile Setup'),h('button',{className:'mcl',onClick:closeModal},'×')));
  const body=h('div',{className:'mbody'});

  const g={};
  const Q=(q,hint)=>body.appendChild(h('div',{style:'margin:16px 0 6px'},h('div',{style:'font-size:13px;font-weight:600;color:var(--text)'},q),hint?h('div',{style:'font-size:11px;color:var(--muted);margin-top:2px'},hint):null));
  const inp=(key,ph,val)=>{const i=h('input',{className:'fi',placeholder:ph||'',value:val||''});g[key]=val||'';i.addEventListener('input',e=>{g[key]=e.target.value});return i};
  const ta=(key,ph,rows,val)=>{const t=h('textarea',{className:'fta',rows:rows||3,placeholder:ph||''});t.value=val||'';g[key]=val||'';t.addEventListener('input',e=>{g[key]=e.target.value});return t};
  const row=(...kids)=>{const d=h('div',{className:'fgrid'});kids.forEach(k=>d.appendChild(h('div',{className:'fg'},k)));body.appendChild(d)};
  const full=k=>body.appendChild(h('div',{className:'fgrid'},h('div',{className:'fg full'},k)));

  Q("Let's start simple — what's your full name?");
  full(inp('full_name','Jane A. Doe', pi.full_name||p.name));
  Q('How can programs reach you?');
  row(inp('email','jane@email.com', pi.email), inp('phone','(555) 123-4567', pi.phone));
  Q('Where are you based?');
  body.appendChild(h('div',{className:'fgrid'},h('div',{className:'fg'},inp('city','City', pi.city)),h('div',{className:'fg'},inp('state','State / Province', pi.state)),h('div',{className:'fg'},inp('country','Country', pi.country))));
  Q('Where do you study, and when will you graduate?');
  row(inp('university','Your school', pi.university), inp('graduation_year','2027', pi.graduation_year));
  Q("What are you studying, and what's your GPA?");
  row(inp('major','Your major', pi.major), inp('gpa','3.8', pi.gpa));
  Q('In a few sentences, tell us about yourself.','Your background, what drives you, and your goals. We\'ll auto-extract extra details (school, GPA, links, languages…) from this.');
  full(ta('about_me','Write freely…',5, pi.about_me));
  Q('A few activities or leadership roles you\'re proud of?','One per line.');
  full(ta('activities_text','President, Student Government\nVolunteer, Local Clinic',3));
  Q('Any awards or honors?','One per line.');
  full(ta('awards_text','Dean\'s List\nNational Merit Finalist',3));
  Q('What are your strongest skills?','Comma separated.');
  full(inp('skills','Python, public speaking, Spanish'));
  Q('What kinds of opportunities are you looking for?','Comma-separated interests — these tune which opportunities rank highest for you.');
  full(inp('interests','premed, research, global health, remote'));

  modal.appendChild(body);
  const finish=async()=>{
    try{
      const toArr=s=>(s||'').split(',').map(x=>x.trim()).filter(Boolean);
      const lines=s=>(s||'').split('\n').map(x=>x.trim()).filter(Boolean);
      let sug={};
      if((g.about_me||'').trim().length>15){try{const r=await api('POST','/api/personal-info/extract',{text:g.about_me});sug=r.suggestions||{}}catch(e){}}
      const pick=k=>g[k]||sug[k]||pi[k]||null;       // answered > extracted > existing > null
      const piPayload={
        full_name:pick('full_name'),email:pick('email'),phone:pick('phone'),
        city:pick('city'),state:pick('state'),country:pick('country'),
        university:pick('university'),graduation_year:pick('graduation_year'),
        major:pick('major'),gpa:pick('gpa'),
        degree_type:sug.degree_type||pi.degree_type||null,
        linkedin_url:sug.linkedin_url||pi.linkedin_url||null,
        github_url:sug.github_url||pi.github_url||null,
        about_me:g.about_me||pi.about_me||null,
      };
      const skillSet=[...new Set([...(pi.skills||[]),...toArr(g.skills),...(sug.skills||[])])];
      if(skillSet.length)piPayload.skills=skillSet;
      if(sug.languages)piPayload.languages=[...(pi.languages||[]),...sug.languages.filter(s=>!(pi.languages||[]).some(l=>(l.language||'').toLowerCase()===(s.language||'').toLowerCase()))];
      const acts=lines(g.activities_text).map(t=>({name:t,role:'',dates:'',hours:'',description:''}));
      const aws=lines(g.awards_text).map(t=>({name:t,issuer:'',year:'',description:''}));
      if(acts.length)piPayload.activities=[...(pi.activities||[]),...acts];
      if(aws.length)piPayload.awards=[...(pi.awards||[]),...aws];
      const ints=toArr(g.interests);
      const profilePayload={name:pick('full_name'),interests:ints.length?ints:(p.interests||[]),
        education_level:p.education_level||null,prefer_remote:!!p.prefer_remote,
        preferred_regions:p.preferred_regions||[],experience_summary:p.experience_summary||null};
      await Promise.all([api('POST','/api/profile',profilePayload),api('POST','/api/personal-info',piPayload)]);
      toast('ok','Profile updated from your answers');closeModal();loadProfile();loadPersonalInfo();loadEligibilityScreen();
    }catch(e){toast('err',e.message)}
  };
  const foot=h('div',{className:'mfoot'});foot.appendChild(h('button',{className:'btn btn-ghost',onClick:closeModal},'Cancel'));foot.appendChild(h('button',{className:'btn btn-primary',onClick:finish},'Build my profile'));modal.appendChild(foot);ov.appendChild(modal);return ov;

  const fbg=h('div',{className:'fg full'});fbg.appendChild(h('label',{className:'fl'},'Decision feedback'));const fb=h('textarea',{className:'fta',rows:2,placeholder:'Reviewer feedback after a decision (optional)'});fb.value=f.feedback||'';fb.addEventListener('input',e=>af('feedback',e.target.value));fbg.appendChild(fb);grid.appendChild(fbg);
